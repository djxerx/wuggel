<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Icons — Word Swipe</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e2e8f0; padding: 30px; }
    h1   { font-size: 22px; margin-bottom: 6px; }
    p    { color: #6b7280; margin-bottom: 30px; font-size: 14px; }
    .set { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .set canvas { border-radius: 18%; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    .meta { display: flex; flex-direction: column; gap: 6px; }
    .meta span { font-size: 13px; color: #6b7280; }
    a.dl {
      display: inline-block; padding: 9px 20px;
      background: #e94560; color: #fff; border-radius: 8px;
      text-decoration: none; font-weight: 600; font-size: 14px;
    }
    a.dl:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Word Swipe — Icon Generator</h1>
  <p>Opens locally in any browser. Click Download, save the PNG into the <code>icons/</code> folder.</p>

  <div class="set">
    <canvas id="c512" width="512" height="512"></canvas>
    <div class="meta">
      <span>512 × 512 px · maskable</span>
      <a class="dl" id="dl512" download="icon-512.png">Download icon-512.png</a>
    </div>
  </div>

  <div class="set">
    <canvas id="c192" width="192" height="192"></canvas>
    <div class="meta">
      <span>192 × 192 px · PWA home-screen</span>
      <a class="dl" id="dl192" download="icon-192.png">Download icon-192.png</a>
    </div>
  </div>

  <div class="set">
    <canvas id="c180" width="180" height="180"></canvas>
    <div class="meta">
      <span>180 × 180 px · Apple touch icon</span>
      <a class="dl" id="dl180" download="icon-180.png">Download icon-180.png</a>
    </div>
  </div>

<script>
function drawTile(canvas) {
  const ctx = canvas.getContext('2d');
  const S   = canvas.width;
  const pad = Math.round(S * 0.055);
  const r   = Math.round(S * 0.14);
  const x   = pad, y = pad, w = S - pad * 2, h = S - pad * 2;

  // ── Rounded rect path helper ────────────────────────────
  function roundRect(cx, cy, cw, ch, cr) {
    ctx.beginPath();
    ctx.moveTo(cx + cr, cy);
    ctx.arcTo(cx + cw, cy,      cx + cw, cy + ch, cr);
    ctx.arcTo(cx + cw, cy + ch, cx,      cy + ch, cr);
    ctx.arcTo(cx,      cy + ch, cx,      cy,      cr);
    ctx.arcTo(cx,      cy,      cx + cw, cy,      cr);
    ctx.closePath();
  }

  // ── White tile background ────────────────────────────────
  roundRect(x, y, w, h, r);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // ── Border ───────────────────────────────────────────────
  roundRect(x, y, w, h, r);
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth   = S * 0.012;
  ctx.stroke();

  // ── Letter W ─────────────────────────────────────────────
  ctx.fillStyle    = '#000000';
  ctx.font         = `900 ${Math.round(S * 0.615)}px Georgia, serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('W', S / 2, S * 0.755);

  // ── Point value ──────────────────────────────────────────
  ctx.font         = `700 ${Math.round(S * 0.142)}px Georgia, serif`;
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('4', S - pad - S * 0.054, S - pad - S * 0.054);
}

[
  { cvs: 'c512', dl: 'dl512' },
  { cvs: 'c192', dl: 'dl192' },
  { cvs: 'c180', dl: 'dl180' },
].forEach(({ cvs, dl }) => {
  const canvas = document.getElementById(cvs);
  drawTile(canvas);
  document.getElementById(dl).href = canvas.toDataURL('image/png');
});
</script>
</body>
</html>
