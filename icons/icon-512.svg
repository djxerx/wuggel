<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8CFA0"/>
      <stop offset="100%" stop-color="#B8904A"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="tileClip">
      <rect x="28" y="28" width="456" height="456" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <rect x="36" y="42" width="456" height="456" rx="72" ry="72"
        fill="rgba(0,0,0,0.35)" filter="url(#blur)"/>
  <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>

  <!-- Main tile body -->
  <rect x="28" y="28" width="456" height="456" rx="72" ry="72" fill="url(#tileGrad)"/>

  <!-- Top shine overlay -->
  <rect x="28" y="28" width="456" height="240" rx="72" ry="72"
        fill="url(#shineGrad)" clip-path="url(#tileClip)"/>

  <!-- Tile border -->
  <rect x="28" y="28" width="456" height="456" rx="72" ry="72"
        fill="none" stroke="#8A6830" stroke-width="5"/>

  <!-- Letter W -->
  <text x="256" y="378"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="318" font-weight="900"
        text-anchor="middle"
        fill="#2C1608">W</text>

  <!-- Point value -->
  <text x="444" y="472"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="700"
        text-anchor="end"
        fill="#2C1608">4</text>
</svg>
