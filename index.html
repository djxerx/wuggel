<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / iOS full-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Video Poker" />
  <meta name="theme-color" content="#0a1a3a" />
  <meta name="description" content="Jacks or Better video poker — 9/6 pay table" />

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icon — no sizes attr, root path, most reliable for iOS -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Standard favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <title>Jacks or Better</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a1a3a;
      --bg2:         #0d2050;
      --gold:        #f0c040;
      --gold-dark:   #c89a20;
      --silver:      #c0c8d8;
      --green:       #1a7a3a;
      --green-dark:  #145e2c;
      --red:         #cc2222;
      --white:       #ffffff;
      --card-back:   #cc2222;
      --card-front:  #fdf6e3;
      --card-radius: 10px;
      --shadow:      0 4px 18px rgba(0,0,0,0.6);
      /* Safe-area insets as custom properties so JS can read computed px values */
      --sal: env(safe-area-inset-left,   0px);
      --sar: env(safe-area-inset-right,  0px);
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Courier New', Courier, monospace;
      color: var(--white);
      overflow: hidden;
    }

    /* ─── Terminal Shell ────────────────────────────────────── */
    #terminal {
      width: 820px;
      padding: 12px 16px 18px;
      background: linear-gradient(180deg, #0d2255 0%, #091840 100%);
      border: 3px solid #2a4a9a;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(20,60,180,0.5), inset 0 0 30px rgba(0,0,50,0.4);
      display: flex;
      flex-direction: column;
      gap: 10px;
      user-select: none;
      visibility: hidden;           /* hidden until rescale() runs */
      transform-origin: center center;
    }

    /* ─── Title Bar ─────────────────────────────────────────── */
    #title-bar {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 2px 0 rgba(0,0,0,0.4);
      text-transform: uppercase;
      padding: 4px 0 2px;
      border-bottom: 2px solid #2a4a9a;
    }
    #title-bar .t-red    { color: #ff3333; text-shadow: 0 0 10px rgba(255,60,60,0.5), 0 2px 0 #6a0000; }
    #title-bar .t-yellow { color: var(--gold); text-shadow: 0 0 10px rgba(240,192,64,0.6), 0 2px 0 #6a4000; }

    /* ─── Pay Table ─────────────────────────────────────────── */
    #paytable {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      font-size: clamp(8px, 1.5vw, 11px);
    }
    .pt-hand {
      background: #0a1a50;
      border: 1px solid #1a3a8a;
      border-radius: 4px;
      padding: 3px 2px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pt-hand.highlight {
      background: var(--gold);
      color: #000;
      border-color: #fff;
      font-weight: bold;
    }
    .pt-name {
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(6px, 1.2vw, 9px);
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }
    .pt-hand.highlight .pt-name { color: #000; }
    /* Single payout value — only the active bet column is shown */
    .pt-pay {
      background: #000c30;
      border-radius: 3px;
      padding: 2px 3px;
      color: var(--gold);
      font-size: clamp(9px, 1.5vw, 13px);
      font-weight: bold;
      text-align: center;
    }
    .pt-hand.highlight .pt-pay { background: #ff8c00; color: #fff; }

    /* ─── Credit & Bet Display ──────────────────────────────── */
    #info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .info-box {
      flex: 1;
      background: #000c30;
      border: 2px solid #2a4a9a;
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
    }
    .info-label {
      font-size: clamp(8px, 1.5vw, 10px);
      color: var(--silver);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .info-value {
      font-family: Impact, 'Arial Narrow', sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: bold;
      color: var(--gold);
      text-shadow: 0 0 8px rgba(240,192,64,0.5);
      letter-spacing: 2px;
    }
    /* ─── Denomination (right column of info-row) ──────────────── */
    #denomination-row {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .denom-label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(7px, 1.3vw, 9px);
      color: var(--silver);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .denom-line {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .btn-denom-util {
      font-family: Arial, Helvetica, sans-serif;
      background: #1a2a60;
      border: 2px solid var(--gold);
      border-radius: 6px;
      color: var(--gold);
      font-size: clamp(8px, 1.4vw, 11px);
      font-weight: bold;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-denom-util:hover {
      background: var(--gold-dark);
      border-color: var(--gold);
      color: #000;
    }
    .denom-btns {
      display: flex;
      gap: 4px;
    }
    .denom-btn {
      font-family: Arial, Helvetica, sans-serif;
      background: #1a2a60;
      border: 2px solid #3a5aaa;
      border-radius: 6px;
      color: var(--silver);
      font-family: 'Courier New', monospace;
      font-size: clamp(8px, 1.4vw, 11px);
      font-weight: bold;
      padding: 4px 7px;
      cursor: pointer;
      transition: all 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .denom-btn:hover  { background: #2a3a80; border-color: var(--gold); color: var(--gold); }
    .denom-btn.active { background: var(--gold-dark); border-color: var(--gold); color: #000; }

    /* ─── Message Banner ────────────────────────────────────── */
    #message {
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      font-size: clamp(14px, 3vw, 20px);
      font-weight: bold;
      letter-spacing: 3px;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(240,192,64,0.6);
      min-height: 28px;
      text-transform: uppercase;
    }

    /* ─── Card Area ─────────────────────────────────────────── */
    #cards-row {
      display: flex;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 12px);
    }

    .card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    /* HOLD badge */
    .hold-badge {
      font-size: clamp(18px, 3.6vw, 26px);
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--gold);
      text-shadow: 0 0 6px rgba(240,192,64,0.8);
      visibility: hidden;
      text-transform: uppercase;
      min-height: 28px;
    }
    .hold-badge.visible { visibility: visible; }

    /* Card face */
    .card {
      width: 124px;
      height: 174px;
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      perspective: 600px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.7); }
    .card.held  { transform: translateY(-10px); box-shadow: 0 12px 30px rgba(240,192,64,0.5); }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }
    .card.flipping .card-inner { animation: flip var(--flip-duration, 0.56s) ease forwards; }

    /* Continuous one-direction flip: rotate to -90° (edge-on), then jump to
       +90° — also edge-on, so the jump is invisible — and continue on to 0°.
       The back→face swap happens at the midpoint while the card is edge-on,
       so the whole flip reads as one smooth rotation in a single direction. */
    @keyframes flip {
      0%     { transform: rotateY(0deg); }
      49.99% { transform: rotateY(-90deg); }
      50%    { transform: rotateY(90deg); }
      100%   { transform: rotateY(0deg); }
    }

    .card-face, .card-back {
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      backface-visibility: hidden;
    }

    /* ── Card Back ── */
    .card-back {
      background: var(--card-back);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-back-pattern {
      width: 85%; height: 85%;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(10, 1fr);
      gap: 1px;
      padding: 4px;
    }
    .dot {
      background: rgba(255,255,255,0.75);
      border-radius: 50%;
      width: 3px;
      height: 3px;
      margin: auto;
    }

    /* ── Card Front ── */
    .card-face {
      background: var(--card-front);
      padding: 5px;
      /* position:absolute + inset:0 come from the shared .card-face,.card-back rule
         above — absolute elements are still valid positioning anchors for their
         own absolutely-positioned children (the rank badge) */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;   /* bottom-suit stays at the bottom */
    }
    .card-face.red  { color: #cc0000; }
    .card-face.black { color: #111; }

    /* Rank is pinned to a fixed distance from the top-left corner so it
       never shifts regardless of which glyph is rendered */
    .corner.tl {
      position: absolute;
      top: 8px;
      left: 8px;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .corner .rank {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }
    /* Small suit symbol under the rank (both themes) */
    .corner .suit-small {
      display: block;
      font-size: 38px;
      line-height: 1;
      margin-top: 1px;
    }

    /* Suit symbol at bottom-center.
       cqw = % of the card's container width, so this is always
       exactly 70% of the card's rendered width on any screen/orientation. */
    .bottom-suit {
      align-self: center;
      font-size: 102px;    /* scaled by transform:scale with the terminal */
      line-height: 1;
      margin-bottom: 2px;
    }

    /* ─── Buttons Row ───────────────────────────────────────── */
    /* Fixed px sizing (no vw units): the terminal has a fixed 820px natural
       width and is scaled as a whole, so viewport-relative padding made the
       row overflow on wide screens and wrap a button onto a second row.
       nowrap + flex-shrink means buttons resize instead of wrapping. */
    #buttons-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    /* Equal halves flanking the (classic-only) center coin slot, so the
       coin sits at the exact center; left buttons narrow to compensate */
    .btn-group {
      display: flex;
      gap: 8px;
      flex: 1 1 0;
      min-width: 0;
    }

    .btn {
      font-family: Impact, 'Arial Narrow', sans-serif;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 8px;
      border-radius: 8px;
      border: 2px solid;
      cursor: pointer;
      transition: all 0.15s;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-reset {
      background: linear-gradient(180deg, #6a1a1a, #4a0a0a);
      border-color: #cc4444;
      color: #ffaaaa;
    }
    .btn-reset:hover:not(:disabled) {
      background: linear-gradient(180deg, #8a2222, #6a1010);
      box-shadow: 0 0 12px rgba(200,60,60,0.5);
    }

    .btn-settings {
      background: linear-gradient(180deg, #2a2a4a, #1a1a3a);
      border-color: #6a6a9a;
      color: #aaaacc;
      font-size: 26px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      min-width: 0;
      flex: 0 0 auto;    /* gear keeps its natural size; text buttons flex */
    }
    .btn-settings:hover:not(:disabled) {
      background: linear-gradient(180deg, #3a3a6a, #2a2a4a);
      border-color: #aaaadd;
      color: #ddddff;
      box-shadow: 0 0 10px rgba(160,160,220,0.4);
    }

    .btn-graph {
      background: linear-gradient(180deg, #1a6a6a, #0e4444);
      border-color: #3acccc;
      color: #aaffff;
    }
    .btn-graph:hover:not(:disabled) {
      background: linear-gradient(180deg, #2a8a8a, #1a5a5a);
      box-shadow: 0 0 12px rgba(58,204,204,0.5);
    }

    .btn-analyze {
      background: linear-gradient(180deg, #7a6a00, #4a4000);
      border-color: #ccaa00;
      color: #ffee88;
    }
    .btn-analyze:hover:not(:disabled) {
      background: linear-gradient(180deg, #9a8800, #5a5000);
      box-shadow: 0 0 12px rgba(204,170,0,0.5);
    }

    .btn-add-credits {
      background: linear-gradient(180deg, #5a2a8a, #3a1a6a);
      border-color: #aa66dd;
      color: #ddb8ff;
    }
    .btn-add-credits:hover:not(:disabled) {
      background: linear-gradient(180deg, #7a3aaa, #4a2280);
      box-shadow: 0 0 12px rgba(170,102,220,0.5);
    }

    .btn-deal {
      background: linear-gradient(180deg, #2a8a4a, #1a6a34);
      border-color: #4acc6a;
      color: #fff;
      box-shadow: 0 0 12px rgba(42,180,74,0.4);
    }
    .btn-deal:hover:not(:disabled) {
      background: linear-gradient(180deg, #3aaa5a, #2a8a44);
      box-shadow: 0 0 20px rgba(42,220,84,0.6);
    }

    .btn-bet-one {
      background: linear-gradient(180deg, #2a4aaa, #1a2a7a);
      border-color: #5a7acc;
      color: #fff;
    }
    .btn-bet-one:hover:not(:disabled) {
      background: linear-gradient(180deg, #3a5acc, #2a3a9a);
      box-shadow: 0 0 12px rgba(80,120,220,0.5);
    }

    .btn-bet-max {
      background: linear-gradient(180deg, #aa4a00, #7a3000);
      border-color: #ff8c30;
      color: var(--gold);
    }
    .btn-bet-max:hover:not(:disabled) {
      background: linear-gradient(180deg, #cc5a00, #993800);
      box-shadow: 0 0 16px rgba(255,140,48,0.6);
    }

    /* ─── Win Flash ─────────────────────────────────────────── */
    @keyframes winFlash {
      0%, 100% { color: var(--gold); }
      50%       { color: #fff; text-shadow: 0 0 20px #fff; }
    }
    #message.winning { animation: winFlash 0.5s ease 3; }

    /* ─── Joker card label ──────────────────────────────────── */
    .joker-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 19px;
      line-height: 1.05;
    }

    /* ─── Winning-card flash (dealt winners) ─────────────────── */
    @keyframes cardWinFlash {
      0%, 100% { box-shadow: var(--shadow); }
      50%      { box-shadow: 0 0 26px 10px rgba(255,215,0,0.95); }
    }
    .card.win-flash { animation: cardWinFlash 0.4s ease 3; }

    /* ─── Game select button ────────────────────────────────── */
    .btn-game {
      background: linear-gradient(180deg, #8a5a00, #5a3a00);
      border-color: #ffaa00;
      color: #ffd780;
    }
    .btn-game:hover:not(:disabled) {
      background: linear-gradient(180deg, #aa7000, #6a4800);
      box-shadow: 0 0 12px rgba(255,170,0,0.5);
    }

    /* ─── Classic Theme — authentic IGT Game King look ────────
       Modeled on real machine screens: full 5-column pay table with
       dotted leaders and red bet column, arcade red/yellow-outline
       text, beveled yellow buttons, gold coin denom badge, WIN/BET/
       CREDIT status line, serif card corners with suit + big pip. */

    /* Elements that exist in the DOM but only show in classic mode */
    .card-portrait, .wild-stack,
    #classic-status, #classic-gamename { display: none; }

    body.classic { background: #0000b4; }
    body.classic #terminal {
      background: #0000b4;
      border: 4px solid #ffd700;
      border-radius: 4px;
      box-shadow: none;
      font-family: Arial, Helvetica, sans-serif;
      gap: 8px;
    }
    /* Real machines have no title banner — the pay table sits at the top;
       the game name appears small in the bottom-left corner instead */
    body.classic #title-bar { display: none; }
    body.classic #classic-gamename {
      display: block;
      font: bold 12px Arial, Helvetica, sans-serif;
      color: #fff;
      letter-spacing: 1px;
      margin-top: -4px;
    }

    /* ── Classic pay table: rows with dotted leaders, 5 bet columns ── */
    body.classic #paytable {
      display: block;
      border: 2px solid #ffd700;
      background: #000850;
      padding: 3px 6px;
    }
    .ptc-row { display: flex; align-items: stretch; }
    .ptc-name {
      flex: 2.1;
      display: flex;
      align-items: baseline;
      color: #ffd700;
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      padding: 1px 0;
    }
    .ptc-name::after {
      content: '';
      flex: 1;
      border-bottom: 2px dotted #ffd700;
      margin: 0 6px 3px 5px;
    }
    .ptc-pay {
      flex: 1;
      text-align: right;
      color: #ffd700;
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      padding: 1px 10px 1px 0;
      border-left: 2px solid #ffd700;
    }
    .ptc-pay.cur { background: #e02020; }
    .ptc-row.winrow .ptc-name, .ptc-row.winrow .ptc-pay { color: #fff; }

    /* ── Info row: hide modern boxes, keep denom controls centered ── */
    body.classic #info-row .info-box { display: none; }
    body.classic #info-row { justify-content: center; }
    body.classic .denom-label { color: #ffd700; }

    /* ── Arcade text: red fill, yellow outline, hard drop shadow ── */
    body.classic #message {
      font-family: Impact, 'Arial Black', sans-serif;
      font-weight: normal;
      font-size: 26px;
      letter-spacing: 3px;
      color: #e02020;
      text-shadow:
        -1.5px -1.5px 0 #ffd700,  1.5px -1.5px 0 #ffd700,
        -1.5px  1.5px 0 #ffd700,  1.5px  1.5px 0 #ffd700,
        -1.5px  0     0 #ffd700,  1.5px  0     0 #ffd700,
         0     -1.5px 0 #ffd700,  0      1.5px 0 #ffd700,
         3px 3px 0 rgba(0,0,0,0.5);
    }

    /* ── Classic status line: WIN … BET+coin … CREDIT ── */
    body.classic #classic-status {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 8px;
    }
    .cs-text {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: #e02020;
      text-shadow:
        -1.5px -1.5px 0 #ffd700,  1.5px -1.5px 0 #ffd700,
        -1.5px  1.5px 0 #ffd700,  1.5px  1.5px 0 #ffd700,
        -1.5px  0     0 #ffd700,  1.5px  0     0 #ffd700,
         0     -1.5px 0 #ffd700,  0      1.5px 0 #ffd700,
         3px 3px 0 rgba(0,0,0,0.55);
    }
    #cs-bet-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    #cs-bet-label {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
    }
    #cs-coin {
      padding: 7px 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff9a0, #ffd700 55%, #a87800);
      border: 2px solid #f0e090;
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 28px;
      color: #d02020;
      text-shadow: 1.5px 1.5px 0 #803000;
      box-shadow: 2px 3px 5px rgba(0,0,0,0.6), inset 0 0 6px rgba(255,255,255,0.6);
    }

    /* ── HELD badges: white with black shadow ── */
    body.classic .hold-badge {
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.8);

<script>

// ════════════════════════════════════════════════════════════
const SUITS      = ['♠','♥','♦','♣'];

const DENOMINATIONS = [
  { label:'¢25',  value: 0.25 },

// ════════════════════════════════════════════════════════════
//  GAME DEFINITIONS — pay tables, evaluators, winning-card maps
//  Each pay row: { name, short (pay-table label), col (analysis
//  column label), pays: per-coin payouts ×1..×5 }.

const mult  = b => [b, 2*b, 3*b, 4*b, 5*b];
const ROYAL = { name:'Royal Flush', short:'Royal\nFlush', col:'Royal', pays:[250,500,750,1000,4000] };

function deucesRows(fiveK, sf, fourK, fh, fl){
  return [
    { name:'Natural Royal',   short:'Natural\nRoyal',   col:'N.Royal', pays:[250,500,750,1000,4000] },
    { name:'Four Deuces',     short:'Four\nDeuces',     col:'4 Deuce', pays: mult(200)   },
    { name:'Wild Royal',      short:'Wild\nRoyal',      col:'W.Royal', pays: mult(25)    },
    { name:'Five of a Kind',  short:'Five\nof a Kind',  col:'5Kind',   pays: mult(fiveK) },
    { name:'Straight Flush',  short:'Str.\nFlush',      col:'Str.Fl',  pays: mult(sf)    },
    { name:'Four of a Kind',  short:'Four\nof a Kind',  col:'4Kind',   pays: mult(fourK) },
    { name:'Full House',      short:'Full\nHouse',      col:'Full H',  pays: mult(fh)    },
    { name:'Flush',           short:'Flush',            col:'Flush',   pays: mult(fl)    },

}

const GAMES = {
  jacks: {
    name: 'Jacks or Better',
    titleHTML: '<span class="t-red">Jacks</span> <span class="t-yellow">or</span> <span class="t-red">Better</span>',
    payTables: [
      { label:'9/6 Full Pay', rows: jobRows(9,6) },
      { label:'8/6',          rows: jobRows(8,6) },
      { label:'9/5',          rows: jobRows(9,5) },
      { label:'8/5',          rows: jobRows(8,5) },
    ],
    evaluate: cards => evaluate(cards),
    winCards: cat => winCardsStandard(cat, false),
  },
  bonus: {
    name: 'Bonus Poker',
    titleHTML: '<span class="t-red">Bonus</span> <span class="t-yellow">Poker</span>',
    payTables: [
      { label:'8/5 Full Pay', rows: bonusRows(80,40,25, 8,5, 4, 2) },
      { label:'7/5',          rows: bonusRows(80,40,25, 7,5, 4, 2) },
      { label:'6/5',          rows: bonusRows(80,40,25, 6,5, 4, 2) },
    ],
    evaluate: cards => evalBonusStyle(cards),
    winCards: cat => winCardsStandard(cat, true),
  },
  dbonus: {
    name: 'Double Bonus Poker',
    titleHTML: '<span class="t-red">Double</span> <span class="t-yellow">Bonus</span> <span class="t-red">Poker</span>',
    payTables: [
      { label:'10/7 Full Pay', rows: bonusRows(160,80,50, 10,7, 5, 1) },
      { label:'9/7',           rows: bonusRows(160,80,50,  9,7, 5, 1) },
      { label:'9/6',           rows: bonusRows(160,80,50,  9,6, 5, 1) },
    ],
    evaluate: cards => evalBonusStyle(cards),
    winCards: cat => winCardsStandard(cat, true),
  },
  tens: {
    name: 'Tens or Better',
    titleHTML: '<span class="t-red">Tens</span> <span class="t-yellow">or</span> <span class="t-red">Better</span>',
    payTables: [
      { label:'25/6/5 Full Pay', rows: tensRows(25) },
      { label:'20/6/5',          rows: tensRows(20) },
    ],
    evaluate: cards => evalTens(cards),
    winCards: cat => winCardsStandard(cat, false),
  },
  ddbonus: {
    name: 'Double Double Bonus',
    titleHTML: '<span class="t-red">Double Double</span> <span class="t-yellow">Bonus</span>',
    payTables: [
      { label:'10/6 Full Pay', rows: ddbRows(10,6) },
      { label:'9/6',           rows: ddbRows(9,6)  },
      { label:'9/5',           rows: ddbRows(9,5)  },
    ],
    evaluate: cards => evalDDB(cards),
    winCards: cat => winCardsDDB(cat),
  },
  joker: {
    name: 'Joker Poker',
    titleHTML: '<span class="t-red">Joker</span> <span class="t-yellow">Poker</span>',
    joker: true,
    payTables: [
      { label:'20/7/5 Full Pay', rows: jokerRows(20) },

  deuces: {

    titleHTML: '<span class="t-red">Deuces</span> <span class="t-yellow">Wild</span>',
    payTables: [
      { label:'Full Pay 25/15/9',     rows: deucesRows(15, 9, 5, 3, 2) },

      { label:'Airport 25/15/10',     rows: deucesRows(15,10, 4, 4, 3) },
    ],
    evaluate: cards => evalDeuces(cards),
    winCards: cat => winCardsDeuces(cat),
  },
};
const GAME_KEYS = ['jacks','tens','bonus','dbonus','ddbonus','joker','deuces'];

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
// Per-game state (each game is its own machine: bankroll, history, pay table)
function defaultGameState(){
  return { credits:100, handHistory:[], graphRangeStart:1, payTableIdx:0 };
}
let gameState   = Object.fromEntries(GAME_KEYS.map(k => [k, defaultGameState()]));
let currentGame = 'jacks';

// Live globals mirroring gameState[currentGame] (synced on save/switch)
let credits         = 100;
let handHistory     = [];      // [{credits, delta, type}] — last 1000 entries, persisted
let graphRangeStart = 1;       // persisted start entry for graph range
let payTableIdx     = 0;       // index into curGame().payTables

// Shared (machine-wide) settings
let coinBet      = 5;           // 1–5 coins
let denomIdx     = 1;           // index into DENOMINATIONS ($1 default)
let flipDuration = 560;         // ms — total card flip animation (0 = instant)
let dealDelay    = 350;         // ms — stagger between each card being dealt
let theme        = 'modern';    // 'modern' | 'classic' (Game King look)
let soundOn      = true;
let trainerOn    = false;       // thump + retry on non-optimal hold
let graphShowOpt = true;        // show the optimal-play line on the graph

let deck            = [];
let analysisResults = null;   // pre-computed EV table for the current deal
let analysisToken   = 0;      // invalidates in-flight background analysis
let trainerWarned   = false;  // first non-optimal Draw press warned; second accepted

function curGame()    { return GAMES[currentGame]; }
function curPayRows() { return curGame().payTables[payTableIdx].rows; }
function curEvaluate(cards){ return curGame().evaluate(cards); }

// ── Persistence helpers ──────────────────────────────────────
const SAVE_KEY = 'vp_state';

// Copy the live globals back into the per-game record
function syncToGameState() {
  gameState[currentGame] = { credits, handHistory, graphRangeStart, payTableIdx };
}

// Pull the per-game record into the live globals
function syncFromGameState() {
  const gs = gameState[currentGame];
  credits         = gs.credits;
  handHistory     = gs.handHistory;
  graphRangeStart = gs.graphRangeStart;
  payTableIdx     = Math.min(gs.payTableIdx, curGame().payTables.length - 1);
}

function saveState() {
  try {
    syncToGameState();
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 2, currentGame, games: gameState,
      coinBet, denomIdx, flipDuration, dealDelay, theme, soundOn, trainerOn, graphShowOpt,
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
    if (!s) return;

    if (s.v === 2 && s.games) {
      // v2: per-game records
      GAME_KEYS.forEach(k => {
        const g = s.games[k];
        if (!g) return;
        const gs = gameState[k];
        if (typeof g.credits === 'number' && g.credits >= 0)              gs.credits = g.credits;
        if (Array.isArray(g.handHistory))                                 gs.handHistory = g.handHistory.slice(-1000);
        if (typeof g.graphRangeStart === 'number' && g.graphRangeStart>=1) gs.graphRangeStart = g.graphRangeStart;
        if (typeof g.payTableIdx === 'number' && g.payTableIdx >= 0)      gs.payTableIdx = g.payTableIdx;
      });
      if (GAME_KEYS.includes(s.currentGame)) currentGame = s.currentGame;
    } else {
      // v1 migration: the old single-game save becomes Jacks or Better
      const gs = gameState.jacks;
      if (typeof s.credits === 'number' && s.credits >= 0)                     gs.credits = s.credits;
      if (Array.isArray(s.handHistory))                                        gs.handHistory = s.handHistory.slice(-1000);
      if (typeof s.graphRangeStart === 'number' && s.graphRangeStart >= 1)     gs.graphRangeStart = s.graphRangeStart;
    }

    // Shared settings (same keys in v1 and v2)
    if (typeof s.coinBet      === 'number' && s.coinBet  >= 1 && s.coinBet  <= 5) coinBet      = s.coinBet;
    if (typeof s.denomIdx     === 'number' && s.denomIdx >= 0 && s.denomIdx <  4) denomIdx     = s.denomIdx;
    if (typeof s.flipDuration === 'number' && s.flipDuration >= 0)                flipDuration = s.flipDuration;
    if (typeof s.dealDelay    === 'number' && s.dealDelay    >= 0)                dealDelay    = s.dealDelay;
    if (s.theme === 'classic' || s.theme === 'modern')                            theme        = s.theme;

let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// One square-wave beep. slide shifts the pitch over the note (Hz, +/-).
function beep(freq, dur = 0.08, type = 'square', vol = 0.12, when = 0, slide = 0) {
  if (!soundOn) return;
  try {
    const ctx = ac();
    const t = ctx.currentTime + when;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  } catch(e) {}
}
const sfx = {
  deal()    { beep(740, 0.06); },                        // card flip blip
  hold()    { beep(520, 0.07); },                        // hold on
  unhold()  { beep(360, 0.07); },                        // hold off
  button()  { beep(620, 0.05, 'square', 0.08); },        // generic key press
  tick()    { beep(1046, 0.045, 'square', 0.10); },      // credit count-up tick
  dealtWin(){ [659, 880].forEach((f,i)=>beep(f, 0.10, 'square', 0.12, i*0.10)); },
  win()     { [523, 659, 784, 1046].forEach((f,i)=>beep(f, 0.12, 'square', 0.12, i*0.09)); },
  jackpot() { [523, 659, 784, 1046, 784, 1046, 1318, 1568].forEach((f,i)=>beep(f, 0.16, 'square', 0.14, i*0.13)); },
  thump()   { beep(130, 0.28, 'sine', 0.55, 0, -85); },  // non-optimal hold warning
};

// Record one completed hand (called after credits are finalised)
function recordHand(winCoins, resName) {
  // res: hand result name; opt/optRes/sub are patched in asynchronously
  // once the background analysis resolves the optimal counterfactual
  handHistory.push({ credits, delta: winCoins - coinBet, type: 'hand', res: resName || '', bet: coinBet });
  if (handHistory.length > 1000) handHistory.shift();
  return handHistory[handHistory.length - 1];
}

// Record a manual credit event (add or reset) — shown green on the graph
function recordEvent(type, delta) {
  handHistory.push({ credits, delta, type });   // type: 'add' | 'reset'
  if (handHistory.length > 1000) handHistory.shift();
}

function shuffle(arr){

// ════════════════════════════════════════════════════════════
//  HAND EVALUATION
// ════════════════════════════════════════════════════════════
function rankIndex(r){ return RANKS.indexOf(r); }

function evaluate(cards, highPairs){
  const ri   = cards.map(c=>rankIndex(c.rank)).sort((a,b)=>a-b);
  const suits = cards.map(c=>c.suit);
  const ranks  = cards.map(c=>c.rank);

  const isFlush    = suits.every(s=>s===suits[0]);
  const isStraight = (ri[4]-ri[0]===4 && new Set(ri).size===5) ||
                     // A-2-3-4-5 wheel
                     (ri.join(',') === '0,1,2,3,12');

  // counts
  const freq={};
  ranks.forEach(r=>freq[r]=(freq[r]||0)+1);
  const counts=Object.values(freq).sort((a,b)=>b-a);

  const isRoyal = isFlush && isStraight && ri[4]===12 && ri[3]===11;

  if(isRoyal)                         return 0; // Royal Flush
  if(isFlush  && isStraight)          return 1; // Straight Flush
  if(counts[0]===4)                   return 2; // Four of a Kind
  if(counts[0]===3 && counts[1]===2)  return 3; // Full House
  if(isFlush)                         return 4; // Flush
  if(isStraight)                      return 5; // Straight
  if(counts[0]===3)                   return 6; // Three of a Kind
  if(counts[0]===2 && counts[1]===2)  return 7; // Two Pair
  // High pair: J,Q,K,A by default; Tens or Better passes its own list
  if(counts[0]===2){
    const hp = highPairs || ['J','Q','K','A'];
    const paired=Object.keys(freq).filter(r=>freq[r]===2);
    if(paired.some(r=>hp.includes(r))) return 8;
  }
  return 9; // Nothing
}

// Tens or Better: identical structure, pair floor drops to 10s
function evalTens(cards){
  return evaluate(cards, ['10','J','Q','K','A']);
}

// Double Double Bonus: quads split by rank AND kicker.
// Categories: 0 Royal, 1 SF, 2 4A+2-4 kicker, 3 4(2-4)+A-4 kicker,
// 4 Four Aces, 5 Four 2s–4s, 6 Four 5s–Ks, 7 FH, 8 FL, 9 ST,
// 10 3K, 11 2P, 12 JoB, 13 Nothing
function evalDDB(cards){
  const base = evaluate(cards);
  if(base === 2){
    const freq = {};
    cards.forEach(c => freq[c.rank] = (freq[c.rank]||0)+1);
    const qr     = Object.keys(freq).find(r => freq[r] === 4);
    const kicker = Object.keys(freq).find(r => freq[r] === 1);
    if(qr === 'A')                 return ['2','3','4'].includes(kicker)     ? 2 : 4;
    if(['2','3','4'].includes(qr)) return ['A','2','3','4'].includes(kicker) ? 3 : 5;
    return 6;
  }
  return base < 2 ? base : base + 4;
}

// Joker Poker (Kings or Better): one fully-wild joker.
// Categories: 0 Natural Royal, 1 Five of a Kind, 2 Wild Royal, 3 SF,
// 4 4K, 5 FH, 6 FL, 7 ST, 8 3K, 9 2P, 10 Kings or Better, 11 Nothing
function evalJoker(cards){
  const j      = cards.filter(c => c.joker).length;
  const others = cards.filter(c => !c.joker);
  const vals     = others.map(c => rankVal(c.rank));
  const flush    = others.every(c => c.suit === others[0].suit);
  const distinct = new Set(vals).size === vals.length;
  const freq = {};
  others.forEach(c => freq[c.rank] = (freq[c.rank]||0)+1);
  const counts = Object.values(freq).sort((a,b)=>b-a);
  const maxK   = (counts[0]||0) + j;
  let straight = false;
  if(distinct){
    for(const aceLow of [false, true]){
      const v = vals.map(x => (x===14 && aceLow) ? 1 : x);
      if(Math.max(...v) - Math.min(...v) <= 4){ straight = true; break; }
    }
  }
  const royalRanks = flush && distinct && vals.every(v => v >= 10);
  if(j === 0 && royalRanks && straight && others.length === 5) return 0;  // Natural Royal
  if(counts.length === 1 && counts[0] + j === 5)               return 1;  // Five of a Kind
  if(royalRanks && j === 1)                                    return 2;  // Wild Royal
  if(flush && straight)                                        return 3;  // Straight Flush
  if(maxK >= 4)                                                return 4;  // Four of a Kind
  if((j===0 && counts[0]===3 && counts[1]===2) ||
     (j===1 && counts[0]===2 && counts[1]===2))                return 5;  // Full House
  if(flush)                                                    return 6;
  if(straight)                                                 return 7;
  if(maxK >= 3)                                                return 8;  // Three of a Kind
  if(j===0 && counts[0]===2 && counts[1]===2)                  return 9;  // Two Pair
  // Kings or Better: natural pair of K/A, or joker + a K/A
  if((j===0 && Object.keys(freq).some(r => freq[r]===2 && (r==='K'||r==='A'))) ||
     (j===1 && others.some(c => c.rank==='K' || c.rank==='A'))) return 10;
  return 11;
}

// Card value 2..14 (ace high; ace-low handled inside the straight checks)
function rankVal(r){
  return r==='A'?14 : r==='K'?13 : r==='Q'?12 : r==='J'?11 : parseInt(r,10);
}

// Bonus / Double Bonus: same as Jacks or Better but quads split by rank.
// Categories: 0 Royal, 1 SF, 2 Four Aces, 3 Four 2s–4s, 4 Four 5s–Ks,
//             5 FH, 6 FL, 7 ST, 8 3K, 9 2P, 10 JoB, 11 Nothing
function evalBonusStyle(cards){
  const base = evaluate(cards);          // 0..9 in the JoB category list
  if(base === 2){                        // four of a kind — split by rank
    const freq = {};
    cards.forEach(c => freq[c.rank] = (freq[c.rank]||0)+1);
    const qr = Object.keys(freq).find(r => freq[r] === 4);
    if(qr === 'A')                    return 2;
    if(['2','3','4'].includes(qr))    return 3;
    return 4;
  }
  return base < 2 ? base : base + 2;     // shift FH..Nothing past the quad split
}

// Deuces Wild. Categories: 0 Natural Royal, 1 Four Deuces, 2 Wild Royal,
// 3 Five of a Kind, 4 SF, 5 4K, 6 FH, 7 FL, 8 ST, 9 3K, 10 Nothing
function evalDeuces(cards){
  const d      = cards.filter(c => c.rank === '2').length;
  const others = cards.filter(c => c.rank !== '2');
  if(d === 4) return 1;                                    // Four Deuces

  const vals     = others.map(c => rankVal(c.rank));
  const flush    = others.every(c => c.suit === others[0].suit);
  const distinct = new Set(vals).size === vals.length;

  const freq = {};
  others.forEach(c => freq[c.rank] = (freq[c.rank]||0)+1);
  const counts = Object.values(freq).sort((a,b)=>b-a);
  const maxK   = (counts[0]||0) + d;

  // Straight possible: distinct natural ranks spanning ≤5 values (wilds fill gaps)
  let straight = false;
  if(distinct){
    for(const aceLow of [false, true]){
      const v = vals.map(x => (x===14 && aceLow) ? 1 : x);
      if(Math.max(...v) - Math.min(...v) <= 4){ straight = true; break; }
    }
  }

  const royalRanks = flush && distinct && vals.every(v => v >= 10);
  if(d === 0 && royalRanks && straight)  return 0;         // Natural Royal
  if(royalRanks)                         return 2;         // Wild Royal
  if(counts.length === 1 && counts[0] + d === 5) return 3; // Five of a Kind
  if(flush && straight)                  return 4;         // Straight Flush
  if(maxK >= 4)                          return 5;         // Four of a Kind
  if((d===0 && counts[0]===3 && counts[1]===2) ||
     (d===1 && counts[0]===2 && counts[1]===2)) return 6;  // Full House
  if(flush)                              return 7;
  if(straight)                           return 8;
  if(maxK >= 3)                          return 9;         // Three of a Kind
  return 10;                                               // Nothing
}

// ── Winning-card index helpers (for the dealt-winner flash) ──
function winCardsStandard(cat, isBonus){
  // Map Bonus/Double Bonus categories back onto the JoB layout
  let base = cat;
  if(isBonus){
    if(cat >= 2 && cat <= 4) base = 2;       // any quad
    else if(cat >= 5)        base = cat - 2;
  }
  const freq = {};
  hand.forEach(c => freq[c.rank] = (freq[c.rank]||0)+1);
  const idxOf = pred => hand.map((c,i) => pred(c) ? i : -1).filter(i => i >= 0);
  switch(base){
    case 0: case 1: case 3: case 4: case 5: return [0,1,2,3,4];  // royal/SF/FH/FL/ST
    case 2: { const r = Object.keys(freq).find(r => freq[r]===4); return idxOf(c=>c.rank===r); }
    case 6: { const r = Object.keys(freq).find(r => freq[r]===3); return idxOf(c=>c.rank===r); }
    case 7: { const rs = Object.keys(freq).filter(r => freq[r]===2); return idxOf(c=>rs.includes(c.rank)); }
    case 8: { const r = Object.keys(freq).find(r => freq[r]===2 && ['10','J','Q','K','A'].includes(r)); return idxOf(c=>c.rank===r); }
    default: return [];
  }
}

// Double Double Bonus: kicker quads flash all five; map the rest onto JoB layout
function winCardsDDB(cat){
  if(cat === 2 || cat === 3) return [0,1,2,3,4];
  let base;
  if(cat < 2) base = cat;
  else if(cat <= 6) base = 2;
  else base = cat - 4;
  return winCardsStandard(base, false);
}

function winCardsJoker(cat){
  const idxOf = pred => hand.map((c,i) => pred(c) ? i : -1).filter(i => i >= 0);
  const freq = {};
  hand.forEach(c => { if(!c.joker) freq[c.rank] = (freq[c.rank]||0)+1; });
  switch(cat){
    case 4: case 8: {                       // 4K / 3K: joker + kind rank
      const r = Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0];
      return idxOf(c => c.joker || c.rank === r);
    }
    case 9: { const rs = Object.keys(freq).filter(r => freq[r]===2); return idxOf(c => rs.includes(c.rank)); }
    case 10: {                              // Kings or Better (may use the joker)
      const r = Object.keys(freq).find(r => freq[r]===2 && (r==='K'||r==='A')) ||
                (freq['K'] ? 'K' : 'A');
      return idxOf(c => c.joker || c.rank === r);
    }
    case 11: return [];
    default: return [0,1,2,3,4];            // royals, 5K, SF, FH, FL, ST
  }
}

function winCardsDeuces(cat){
  const idxOf = pred => hand.map((c,i) => pred(c) ? i : -1).filter(i => i >= 0);
  const freq = {};
  hand.forEach(c => { if(c.rank!=='2') freq[c.rank] = (freq[c.rank]||0)+1; });
  switch(cat){
    case 1: return idxOf(c => c.rank==='2');               // four deuces only
    case 5: case 9: {                                      // 4K / 3K: deuces + kind rank
      const r = Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0];
      return idxOf(c => c.rank==='2' || c.rank===r);
    }
    case 10: return [];
    default: return [0,1,2,3,4];  // royals, 5K, SF, FH, FL, ST use all five
  }
}

  pt.innerHTML = '';

  if(theme === 'classic'){
    // Real-machine layout: one row per hand with dotted leaders and all
    // five bet columns; the active bet's column is solid red.
    rows.forEach((row, idx)=>{

      const r = document.createElement('div');

    'background:linear-gradient(180deg,#fff780 0%,#ffe030 45%,#d8a800 100%)',
    'border:2px solid #7a5c00','border-radius:4px','color:#000',
    'cursor:pointer','touch-action:manipulation',
    'box-shadow:inset 1px 1px 0 rgba(255,255,255,0.9), inset -2px -2px 0 rgba(122,92,0,0.5), 2px 3px 0 rgba(0,0,0,0.5)',
  ].join(';');
  done.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

  panel.appendChild(title);
  panel.appendChild(denomRow);
  panel.appendChild(done);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

function buildDenomButtons(){
  const row = document.getElementById('denom-btns');
  row.innerHTML='';
  DENOMINATIONS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='denom-btn'+(i===denomIdx?' active':'');
    b.textContent=d.label;
    b.onclick=()=>{
      // Convert coin count so dollar value of credits stays the same
      const oldDenom = DENOMINATIONS[denomIdx].value;
      const newDenom = DENOMINATIONS[i].value;
      credits = Math.round(credits * oldDenom / newDenom);
      denomIdx = i;
      saveState();
      updateDenomButtons();
      updateInfoRow();
    };
    row.appendChild(b);
  });
}

function updateDenomButtons(){
  document.querySelectorAll('.denom-btn').forEach((b,i)=>{
    b.classList.toggle('active', i===denomIdx);
  });
}

function updateInfoRow(){
  const denom = DENOMINATIONS[denomIdx].value;
  document.getElementById('credits-display').textContent =
    formatMoney(credits * denom);
  document.getElementById('bet-display').textContent =
    formatMoney(coinBet * denom);
  document.getElementById('win-display').textContent =
    formatMoney(lastWin * denom);
  // Classic status line shows raw coin counts, like the real machines
  document.getElementById('cs-win').textContent      = 'WIN ' + lastWin;
  document.getElementById('cs-bet-label').textContent = 'BET ' + coinBet;
  document.getElementById('cs-coin').textContent     = classicDenomLabel();
  document.getElementById('cs-credit').textContent   = 'CREDIT ' + credits;
}

function formatMoney(v){
  if(v === 0)  return '$0';               // always show $0, never ¢0
  if(v < 1)    return '¢' + Math.round(v*100);
  if(Number.isInteger(v)) return '$' + v;
  return '$' + v.toFixed(2);
}

// Animate the credits display counting up from `from` to `to` coins.
// Base rate: 5 steps/sec (200ms each). For large wins the interval shrinks
// so the count always completes within 3 seconds maximum.
let _creditTimer = null;
function animateCredits(from, to){
  if(_creditTimer) clearInterval(_creditTimer);   // cancel any in-flight animation
  const diff = to - from;
  if(diff <= 0){ updateInfoRow(); return; }
  const interval = Math.min(200, 3000 / diff);    // ms per step
  const denom    = DENOMINATIONS[denomIdx].value;
  const el       = document.getElementById('credits-display');
  const elC      = document.getElementById('cs-credit');
  let current    = from;
  let lastTick   = 0;
  _creditTimer   = setInterval(()=>{
    current++;
    el.textContent  = formatMoney(current * denom);
    elC.textContent = 'CREDIT ' + current;
    // Casino-style count-up tick — rate-limited so huge wins don't buzz
    const now = Date.now();
    if(now - lastTick > 65){ sfx.tick(); lastTick = now; }
    if(current >= to){
      clearInterval(_creditTimer);
      _creditTimer = null;
    }
  }, interval);
}

function buildCardBack(){
  const pat = document.createElement('div');
  pat.className = 'card-back-pattern';
  for(let i=0;i<70;i++){
    const d=document.createElement('div');
    d.className='dot';
    pat.appendChild(d);
  }
  const back=document.createElement('div');
  back.className='card-back';
  back.appendChild(pat);
  return back;
}

function classicPortraitSVG(rank){
  const src = CLASSIC_ART[rank];
  return src ? `<img src="${src}" alt="">` : '';
}

function buildCardFace(card){
  const face=document.createElement('div');
  face.className='card-face '+(SUIT_COLOR[card.suit]);

  // Joker gets its own face: vertical JOKER label + star pip
  if(card.joker){
    const jl=document.createElement('div');
    jl.className='joker-label';
    jl.innerHTML='J<br>O<br>K<br>E<br>R';
    face.appendChild(jl);
    const bottom=document.createElement('div');
    bottom.className='bottom-suit';
    bottom.textContent='★';
    face.appendChild(bottom);
    return face;
  }

  // Top-left corner: rank with small suit beneath it (suit shown in classic only)
  const tl=document.createElement('div');
  tl.className='corner tl';
  tl.innerHTML=`<span class="rank">${card.rank}</span><span class="suit-small">${card.suit}</span>`;
  face.appendChild(tl);

  // Classic-mode decorations (hidden by CSS in the modern theme)
  if(['A','K','Q','J'].includes(card.rank)){
    const art=document.createElement('div');
    art.className='card-portrait';
    art.innerHTML=classicPortraitSVG(card.rank);
    face.appendChild(art);
  }
  if(card.rank==='2' && currentGame==='deuces'){
    const w=document.createElement('div');
    w.className='wild-stack';
    w.innerHTML='<span>WILD</span><span>WILD</span><span>WILD</span>';
    face.appendChild(w);
  }

  // Bottom-center: large suit symbol
  const bottom=document.createElement('div');
  bottom.className='bottom-suit';
  bottom.textContent=card.suit;
  face.appendChild(bottom);

  return face;
}

function renderCards(showFaces, animate){
  const row=document.getElementById('cards-row');
  row.innerHTML='';

  hand.forEach((card,i)=>{
    const wrap=document.createElement('div');
    wrap.className='card-wrap';

    // HOLD badge
    const badge=document.createElement('div');
    badge.className='hold-badge'+(held[i]?' visible':'');
    badge.textContent=holdLabel();

    // Card element
    const cardEl=document.createElement('div');
    cardEl.className='card'+(held[i]?' held':'');
    cardEl.dataset.index=i;

    const inner=document.createElement('div');
    inner.className='card-inner';

    const back=buildCardBack();
    const face=buildCardFace(card);

    // Always render both; show face by making back hidden when revealed
    inner.appendChild(back);
    inner.appendChild(face);

    if(showFaces || (phase==='holding' && held[i])){
      back.style.display='none';
    } else if(phase==='holding' && !held[i]){
      // face down for unselected cards in holding phase? no — show all during holding
      back.style.display='none';
    } else {
      face.style.display='none';
    }

    cardEl.appendChild(inner);

    // Tapping handled via event delegation on #cards-row (see init)

    wrap.appendChild(badge);
    wrap.appendChild(cardEl);
    row.appendChild(wrap);
  });
}

function renderCardsBack(){
  // Show card backs only (initial deal animation start)
  const row=document.getElementById('cards-row');
  row.innerHTML='';
  for(let i=0;i<5;i++){
    const wrap=document.createElement('div');
    wrap.className='card-wrap';
    const badge=document.createElement('div');
    badge.className='hold-badge';
    badge.textContent=holdLabel();
    const cardEl=document.createElement('div');
    cardEl.className='card';
    cardEl.dataset.index=i;
    const inner=document.createElement('div');
    inner.className='card-inner';
    inner.appendChild(buildCardBack());
    cardEl.appendChild(inner);
    wrap.appendChild(badge);
    wrap.appendChild(cardEl);
    row.appendChild(wrap);
  }
}

// Flip a specific card to its face with animation
function flipCard(i, delay){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const cardEls=document.querySelectorAll('.card');
      if(!cardEls[i]) { resolve(); return; }
      const inner=cardEls[i].querySelector('.card-inner');
      const back =inner.querySelector('.card-back');
      const face =inner.querySelector('.card-face');
      // Build face and add it hidden — it must not be visible until the card
      // reaches the edge-on (90°) midpoint of the flip animation
      if(face) inner.removeChild(face);
      const newFace = buildCardFace(hand[i]);
      newFace.style.display = 'none';   // hidden: back shows during first half
      inner.appendChild(newFace);

      // Ensure back is showing before animation starts
      if(back) back.style.display = '';

      // Run flip animation (durations driven by the flipDuration setting)
      const mid     = Math.round(flipDuration / 2);
      const cleanup = flipDuration + 30;

      sfx.deal();

      if(flipDuration < 20){
        // Instant flip — skip animation, just swap back→face immediately
        if(back) back.style.display='none';
        inner.querySelector('.card-face').style.display='';
        resolve();
        return;
      }

      cardEls[i].classList.add('flipping');
      setTimeout(()=>{
        // Card is edge-on and invisible at this moment — swap back→face unseen
        if(back) back.style.display='none';
        inner.querySelector('.card-face').style.display='';
      }, mid);
      setTimeout(()=>{
        cardEls[i].classList.remove('flipping');
        resolve();
      }, cleanup);
    }, delay);
  });
}

function toggleHold(i){
  if(phase !== 'holding') return;
  held[i] = !held[i];
  trainerWarned = false;   // a changed hold gets a fresh trainer check

  if(held[i]) sfx.hold(); else sfx.unhold();

  const cardEls = document.querySelectorAll('.card');
  const badges  = document.querySelectorAll('.hold-badge');
  cardEls[i].classList.toggle('held', held[i]);
  badges[i].classList.toggle('visible', held[i]);
}

// Flash a glow around the cards that make up a dealt winning hand
function flashWinningCards(cat){
  const idxs = curGame().winCards(cat);
  const cardEls = document.querySelectorAll('.card');
  idxs.forEach(i => {
    const el = cardEls[i];
    if(!el) return;
    el.classList.add('win-flash');
    setTimeout(() => el.classList.remove('win-flash'), 1400);
  });
}

function setButtons(betting){
  document.getElementById('btn-bet-one').disabled = !betting;
  document.getElementById('btn-bet-max').disabled = !betting;
  document.getElementById('btn-deal').textContent = betting ? 'Deal' : 'Draw';
  document.getElementById('btn-deal').disabled    = false;
  // Analyze is only meaningful during the holding phase (before draw)
  document.getElementById('btn-analyze').disabled = betting;
}

// Guard against double-presses: deal/draw animations and the trainer's
// await both yield to the event loop, so a second press mid-flight must
// be ignored rather than double-deducting or double-drawing.
let dealBusy = false;
async function deal(){
  if(dealBusy) return;
  if(phase === 'result') phase = 'betting';   // result → next hand
  dealBusy = true;
  try { await dealCore(); } finally { dealBusy = false; }
}

async function dealCore(){
  if(phase === 'betting'){
    // Deduct bet (in credits = coins)
    if(credits < coinBet){
      setMessage('Not enough credits!', false);
      sfx.thump();
      return;
    }
    sfx.button();
    credits -= coinBet;
    saveState();
    lastWin   = 0;
    lastHandIdx = -1;
    trainerWarned = false;
    invalidateAnalysis();
    updateInfoRow();
    buildPayTable();

    buildDeck();
    shuffle(deck);
    hand  = [dealCard(),dealCard(),dealCard(),dealCard(),dealCard()];
    held  = [false,false,false,false,false];

    // Show backs first
    renderCardsBack();
    setMessage('Deal your cards...', false);
    setButtons(false);

    // Flip all 5 cards with staggered delays fired simultaneously —
    // using Promise.all keeps the 150ms gap between each card constant
    await Promise.all([0,1,2,3,4].map(i => flipCard(i, i*dealDelay)));

    phase = 'holding';

    // Compute the EV ranking in the background every hand — the trainer
    // needs it at Draw time, and the graph's optimal-play line needs the
    // counterfactual result recorded for every hand played.
    startAnalysisAsync();

    // Dealt a winner already? Flash the winning cards, then show the hand name
    const dealtCat  = curEvaluate(hand);
    const dealtPays = curPayRows()[dealtCat].pays[coinBet-1];
    if(dealtPays > 0){
      lastHandIdx = dealtCat;
      buildPayTable();                       // highlight the pay-table row
      flashWinningCards(dealtCat);
      sfx.dealtWin();
      setMessage('Select cards to hold, then Draw', false);
      const name = curPayRows()[dealtCat].name.toUpperCase();
      setTimeout(() => {
        if(phase === 'holding') setMessage(name + ' — hold & draw', false);
      }, 800);
    } else {
      setMessage('Select cards to hold, then Draw', false);
    }

  } else if(phase === 'holding'){
    // Hold trainer: thump on a non-optimal hold, allow one retry.
    // A second Draw press (without changing the hold) is accepted.
    if(trainerOn && !trainerWarned){
      let ranked = analysisResults;
      if(!ranked){
        // Worker hasn't finished yet (very fast Draw press) — wait for it
        setMessage('Checking your hold…', false);
        ranked = await (analysisPromise || startAnalysisAsync());
      }
      if(ranked && ranked.length){
        let pm = 0;
        for(let i=0;i<5;i++) if(held[i]) pm |= (1<<i);
        if(pm !== ranked[0].mask){
          trainerWarned = true;
          sfx.thump();
          setMessage('Not the best hold — change it, or Draw again to keep it', false);
          return;
        }
      }
    }
    trainerWarned = false;
    sfx.button();

    // Snapshot the pre-draw state: replacement cards come off the deck in a
    // fixed order, so the outcome of ANY hold can be replayed exactly later
    const preHand  = hand.slice();
    const preDeck  = deck.slice();
    const handBet  = coinBet;
    const handRows = curPayRows();
    const handEval = curGame().evaluate;
    let playerMask = 0;
    for(let i=0;i<5;i++) if(held[i]) playerMask |= (1<<i);
    const handAnalysis = analysisPromise || startAnalysisAsync(preHand, preDeck);

    // Draw: replace non-held cards
    for(let i=0;i<5;i++){
      if(!held[i]) hand[i]=dealCard();
    }

    // Animate draw of new cards.
    // Use drawIdx (not i) for the delay so held cards don't create
    // a leading pause — the first drawn card always starts immediately.
    const cardEls=document.querySelectorAll('.card');
    const promises=[];
    let drawIdx=0;
    for(let i=0;i<5;i++){
      if(!held[i]){
        // reset card to back
        const inner=cardEls[i].querySelector('.card-inner');
        const oldFace=inner.querySelector('.card-face');
        if(oldFace) oldFace.remove();
        const back=inner.querySelector('.card-back');
        if(back) back.style.display='';
        promises.push(flipCard(i, drawIdx*dealDelay));
        drawIdx++;
      }
    }
    await Promise.all(promises);

    // Evaluate
    const handIdx=curEvaluate(hand);
    lastHandIdx = handIdx;
    const payRows  = curPayRows();
    const winCoins = payRows[handIdx].pays[coinBet-1];
    lastWin = winCoins;
    const prevCredits = credits;
    credits += winCoins;
    const entry = recordHand(winCoins, payRows[handIdx].name);   // log this hand
    saveState();

    // Patch in the optimal-play counterfactual once the analysis resolves:
    // replay the best hold against the same deck order the draw used.
    handAnalysis.then(ranked => {
      if(!ranked || !ranked.length) return;
      const bestMask = ranked[0].mask;
      const d  = preDeck.slice();
      const oh = preHand.slice();
      for(let i=0;i<5;i++) if(!(bestMask & (1<<i))) oh[i] = d.pop();
      const cat = handEval(oh);
      entry.sub    = bestMask !== playerMask;          // was the play suboptimal?
      entry.opt    = handRows[cat].pays[handBet-1] - handBet;
      entry.optRes = handRows[cat].name;
      saveState();
    }).catch(()=>{});
    updateInfoRow();          // updates Win and Bet displays immediately
    buildPayTable();
    if(winCoins > 0) animateCredits(prevCredits, credits);  // counts up credits

    if(winCoins > 0){
      // Jackpot fanfare for the top-line hands, arpeggio for the rest
      const jackpot = (handIdx === 0 && coinBet === 5) ||
                      (currentGame === 'deuces' && handIdx === 1);
      if(jackpot) sfx.jackpot(); else sfx.win();
      const msg = handIdx===0 && coinBet===5
        ? '🎰 ' + payRows[0].name.toUpperCase() + ' — JACKPOT! 🎰'
        : payRows[handIdx].name.toUpperCase() + '  +' + winCoins + ' CREDITS!';
      setMessage(msg, true);
    } else {
      setMessage('No winner — try again', false);
    }

    phase = 'result';
    setButtons(true);

    // After result, allow re-deal
    setTimeout(()=>{
      phase = 'betting';
      if(winCoins===0) setMessage('Better luck next time!', false);
    }, 2200);

  }
}

function betOne(){
  if(phase!=='betting') return;
  sfx.button();
  coinBet = (coinBet % 5) + 1;
  buildPayTable();
  updateInfoRow();
}

function addCredits(){
  const input = prompt('How many credits would you like to add?');
  if(input === null) return;               // user cancelled
  const n = parseInt(input, 10);

    alert('Please enter a positive whole number.');

  }
  credits += n;
  recordEvent('add', n);

  updateInfoRow();

}

}
