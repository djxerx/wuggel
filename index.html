//  ANALYSIS ENGINE
// ════════════════════════════════════════════════════════════

// Iterate every k-combination of arr, reusing a single buffer for speed
function iterCombos(arr, k, fn) {
  const n   = arr.length;
  const idx = Array.from({length:k}, (_,i)=>i);
  const buf = new Array(k);
  for(;;) {
    for(let j=0;j<k;j++) buf[j] = arr[idx[j]];
    fn(buf);
    let i = k-1;
    while(i>=0 && idx[i]===n-k+i) i--;
    if(i<0) break;
    idx[i]++;
    for(let j=i+1;j<k;j++) idx[j]=idx[j-1]+1;
  }
}

// ── EV analysis Web Worker ───────────────────────────────────
// The full 32-mask computation (up to ~2.6M hand evaluations) runs OFF the
// main thread so card taps stay instant during the hold phase. The worker
// is built from a Blob of this file's own evaluator functions, so the game
// stays a single self-contained file (and works offline).
function evWorkerSource(){
  const fns = [rankIndex, evaluate, rankVal, evalBonusStyle, evalDeuces, evalTens, evalDDB, evalJoker, iterCombos]
    .map(f => f.toString()).join('\n');
  const main = `
const EVAL_FNS = { jacks: evaluate, tens: evalTens, bonus: evalBonusStyle, dbonus: evalBonusStyle,
                   ddbonus: evalDDB, joker: evalJoker, deuces: evalDeuces };
self.onmessage = e => {
  const { token, gameKey, rows, coinBet, hand, deck } = e.data;
  const evalFn = EVAL_FNS[gameKey];
  const nCats  = rows.length;
  const rh  = new Array(5);
  const out = [];
  for(let mask=0; mask<32; mask++){
    const heldCards = [];
    for(let i=0;i<5;i++) if(mask & (1<<i)) heldCards.push(hand[i]);
    const drawN = 5 - heldCards.length;
    for(let i=0;i<heldCards.length;i++) rh[i] = heldCards[i];
    const handSum    = new Float64Array(nCats);
    const handCounts = new Int32Array(nCats);
    let cnt = 0;
    if(drawN === 0){
      const hi = evalFn(hand);
      handSum[hi]    += rows[hi].pays[coinBet-1];
      handCounts[hi] += 1;
      cnt = 1;
    } else {
      iterCombos(deck, drawN, combo => {
        for(let i=0;i<drawN;i++) rh[heldCards.length+i] = combo[i];
        const hi = evalFn(rh);
        handSum[hi]    += rows[hi].pays[coinBet-1];
        handCounts[hi] += 1;
        cnt++;
      });
    }
    const handEV   = Array.from(handSum,    v => v / cnt);
    const handOdds = Array.from(handCounts, c => c / cnt);
    out.push({ mask, heldCards, ev: handEV.reduce((s,v)=>s+v,0), handEV, handOdds });
  }
  out.sort((a,b) => b.ev - a.ev);
  self.postMessage({ token, results: out });
};`;
  return 'const RANKS = ' + JSON.stringify(RANKS) + ';\n' + fns + '\n' + main;
}

let evWorker  = null;
let evPending = {};
function getEVWorker(){
  if(evWorker) return evWorker;
  const blob = new Blob([evWorkerSource()], { type: 'text/javascript' });
  evWorker = new Worker(URL.createObjectURL(blob));
  evWorker.onmessage = e => {
    const { token, results } = e.data;
    const resolve = evPending[token];
    delete evPending[token];
    if(resolve) resolve(results);
  };
  return evWorker;
}

// Discard any computed/in-flight analysis (new deal, game or pay-table change)
function invalidateAnalysis(){
  analysisResults = null;
  analysisPromise = null;
  analysisToken++;
}

// Kick off EV computation in the worker. Snapshots hand/deck so changes
// during the hold phase don't corrupt results. Returns a promise of the
// ranked results; also stores them in analysisResults when they arrive.
let analysisPromise = null;
function startAnalysisAsync(snapHand, snapDeck) {
  analysisResults = null;
  const token = ++analysisToken;
  const h = (snapHand || hand).slice();
  const d = (snapDeck || deck).slice();
  analysisPromise = new Promise(resolve => {
    try {
      evPending[token] = resolve;
      getEVWorker().postMessage({
        token, gameKey: currentGame, rows: curPayRows(), coinBet,
        hand: h, deck: d,
      });
    } catch(err) {
      // No Worker support — fall back to a main-thread computation
      delete evPending[token];
      resolve(computeAllEVs(h, d));
    }
  }).then(results => {
    if(token === analysisToken) analysisResults = results;
    return results;
  });
  return analysisPromise;
}

// EV for one hold bitmask against the current game's pay table.
// handSum[i]    = total coins paid by hand-type i across all draws
// handCounts[i] = number of draws producing hand-type i (for odds)
function computeMaskEV(mask, snapHand, snapDeck){
  const rows  = curPayRows();
  const nCats = rows.length;
  const evalFn = curGame().evaluate;
  const rh = new Array(5);

  const heldCards = [];
  for(let i=0;i<5;i++) if(mask & (1<<i)) heldCards.push(snapHand[i]);
  const drawN = 5 - heldCards.length;
  for(let i=0;i<heldCards.length;i++) rh[i] = heldCards[i];

  const handSum    = new Float64Array(nCats);
  const handCounts = new Int32Array(nCats);
  let cnt = 0;

  if(drawN === 0){
    const hi = evalFn(snapHand);
    handSum[hi]    += rows[hi].pays[coinBet-1];
    handCounts[hi] += 1;
    cnt = 1;
  } else {
    iterCombos(snapDeck, drawN, combo => {
      for(let i=0;i<drawN;i++) rh[heldCards.length+i] = combo[i];
      const hi = evalFn(rh);
      handSum[hi]    += rows[hi].pays[coinBet-1];
      handCounts[hi] += 1;
      cnt++;
    });
  }

  const handEV   = Array.from(handSum,    v => v / cnt);
  const handOdds = Array.from(handCounts, c => c / cnt);
  return { mask, heldCards, ev: handEV.reduce((s,v)=>s+v,0), handEV, handOdds };
}

// Compute EV for all 32 hold bitmasks, sorted best→worst
function computeAllEVs(snapHand, snapDeck) {
  const out = [];
  for(let mask=0; mask<32; mask++) out.push(computeMaskEV(mask, snapHand, snapDeck));
  return out.sort((a,b) => b.ev - a.ev);
}

// One-off analysis of an arbitrary hand+deck (used by "Analyze a Hand").
// Runs in the worker on a separate token space so it never disturbs the
// live game's analysisResults/analysisPromise/token state.
let adhocToken = 1000000000;
function analyzeHandAsync(h, d){
  const token = ++adhocToken;
  return new Promise(resolve => {
    try {
      evPending[token] = resolve;
      getEVWorker().postMessage({
        token, gameKey: currentGame, rows: curPayRows(), coinBet,
        hand: h.slice(), deck: d.slice(),
      });
    } catch(err) {
      delete evPending[token];
      resolve(computeAllEVs(h.slice(), d.slice()));
    }
  });
}

// customHand/customDeck: analyze a hypothetical hand (no "you" row/footer)
function showAnalysis(customHand, customDeck) {
  const isCustom = !!customHand;
  const aHand = customHand || hand;
  const denom = DENOMINATIONS[denomIdx].value;

  let playerMask = -1;             // custom hands have no player hold
  if(!isCustom){
    playerMask = 0;
    for(let i=0;i<5;i++) if(held[i]) playerMask |= (1<<i);
  }

  // Column order: most common → rarest (reverse of the pay-table order)
  const HAND_COLS = curPayRows()
    .map((r, idx) => ({ label: r.col, idx }))
    .filter(c => c.label)      // drop the "Nothing" row
    .reverse();

  // ── Mode state ─────────────────────────────────────────────
  let oddsMode = false;   // false = payouts, true = odds %

  // ── Overlay ────────────────────────────────────────────────
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed','inset:0','z-index:9999',
    'background:rgba(0,5,25,0.92)',
    'display:flex','align-items:center','justify-content:center',
    'font-family:Arial,Helvetica,sans-serif',
  ].join(';');

  // ── Panel ──────────────────────────────────────────────────
  const panel = document.createElement('div');
  panel.style.cssText = [
    'background:linear-gradient(180deg,#0d2255 0%,#091840 100%)',
    'border:2px solid #2a4a9a','border-radius:14px',
    'box-shadow:0 0 30px rgba(20,60,180,0.6)',
    'padding:16px','width:min(960px,96vw)',
    'display:flex','flex-direction:column','gap:10px',
    'max-height:92vh','overflow:hidden',
  ].join(';');

  // ── Title ──────────────────────────────────────────────────
  const title = document.createElement('div');
  title.style.cssText = [
    'text-align:center','font-size:15px','font-weight:bold',
    'color:#f0c040','letter-spacing:3px','text-transform:uppercase',
    'text-shadow:0 0 8px rgba(240,192,64,0.5)','flex-shrink:0',
  ].join(';');
  title.textContent = isCustom ? curGame().name + ' — Hand Analysis' : 'Optimal Hold Analysis';

  const handLine = document.createElement('div');
  handLine.style.cssText = 'text-align:center;font-size:12px;color:#c0c8d8;letter-spacing:1px;flex-shrink:0;';
  const cardLabel = c => c.joker ? 'JKR' : c.rank + c.suit;
  handLine.textContent = 'Hand:  ' + aHand.map(cardLabel).join('   ');

  // ── Scrollable table wrapper ───────────────────────────────
  const scroll = document.createElement('div');
  scroll.style.cssText = 'overflow:auto;flex:1;';

  const content = document.createElement('div');
  const computing = document.createElement('div');
  computing.style.cssText = 'text-align:center;color:#f0c040;font-size:14px;padding:24px 0;';
  computing.textContent   = 'Computing all hold combinations…';
  content.appendChild(computing);
  scroll.appendChild(content);

  // ── Bottom bar: toggle + close ─────────────────────────────
  const bottomBar = document.createElement('div');
  bottomBar.style.cssText = 'display:flex;justify-content:center;align-items:center;gap:16px;flex-shrink:0;';

  // Toggle button — green="Odds", white="Payouts"
  const toggleBtn = document.createElement('button');
  const applyToggleStyle = () => {
    if(!oddsMode){
      // currently showing payouts → button offers "Odds"
      toggleBtn.textContent = 'Odds';
      toggleBtn.style.cssText = [
        'font-family:Arial,Helvetica,sans-serif','font-size:13px','font-weight:bold',
        'letter-spacing:2px','text-transform:uppercase','padding:8px 22px',
        'background:linear-gradient(180deg,#1a7a3a,#0e4e24)',
        'border:2px solid #3cdc64','border-radius:8px',
        'color:#3cdc64','cursor:pointer','touch-action:manipulation',
      ].join(';');
    } else {
      // currently showing odds → button offers "Payouts"
      toggleBtn.textContent = 'Payouts';
      toggleBtn.style.cssText = [
        'font-family:Arial,Helvetica,sans-serif','font-size:13px','font-weight:bold',
        'letter-spacing:2px','text-transform:uppercase','padding:8px 22px',
        'background:linear-gradient(180deg,#d0d8e8,#a0aac0)',
        'border:2px solid #e0e8f8','border-radius:8px',
        'color:#0a1a3a','cursor:pointer','touch-action:manipulation',
      ].join(';');
    }
  };
  applyToggleStyle();

  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.style.cssText = [
    'font-family:Arial,Helvetica,sans-serif',
    'font-size:13px','font-weight:bold','letter-spacing:2px',
    'text-transform:uppercase','padding:8px 28px',
    'background:linear-gradient(180deg,#2a4aaa,#1a2a7a)',
    'border:2px solid #5a7acc','border-radius:8px',
    'color:#fff','cursor:pointer','touch-action:manipulation',
  ].join(';');

  const close = () => { if(overlay.parentNode) overlay.parentNode.removeChild(overlay); };
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

  bottomBar.appendChild(toggleBtn);
  bottomBar.appendChild(closeBtn);

  panel.appendChild(title);
  panel.appendChild(handLine);
  panel.appendChild(scroll);
  panel.appendChild(bottomBar);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);

  // ── Render function — redraws the table in current mode ────
  let lastRanked = null;

  function render(ranked) {
    lastRanked = ranked;
    // Top 8 options; if the player's hold isn't among them, append it with
    // its full stats so the current selection is always visible.
    const shown      = ranked.slice(0, 8).map((c, i) => ({ combo: c, rank: i + 1 }));
    const playerRank = ranked.findIndex(r => r.mask === playerMask) + 1;
    if(playerRank > 8){
      shown.push({ combo: ranked[playerRank - 1], rank: playerRank });
    }

    // ── Cell helpers ──────────────────────────────────────
    const thStyle = (extra='') =>
      `padding:5px 4px;border-bottom:2px solid #2a4a9a;` +
      `font-weight:bold;font-size:17px;white-space:nowrap;text-align:right;` +
      (oddsMode ? 'color:#3cdc64;' : 'color:#f0c040;') + extra;

    // Payout cell (dollar amounts)
    const tdPay = (val, bold) => {
      const td = document.createElement('td');
      td.style.cssText = `text-align:right;padding:5px 4px;font-size:17px;` +
        `color:${val > 0 ? '#e0e8f8' : '#3a4a6a'};` +
        (bold ? 'font-weight:bold;color:#f0c040;' : '');
      if(val <= 0){
        td.textContent = '—';
      } else {
        const d = +(val * denom).toFixed(2);
        td.textContent = d < 1 ? '$' + d.toFixed(2)
                       : Number.isInteger(d) ? '$' + d
                       : '$' + d.toFixed(2);
      }
      return td;
    };

    // Odds cell (percentage)
    const tdOdds = (val, bold) => {
      const td = document.createElement('td');
      td.style.cssText = `text-align:right;padding:5px 4px;font-size:17px;` +
        `color:${val > 0 ? '#3cdc64' : '#1a3a1a'};` +
        (bold ? 'font-weight:bold;' : '');
      if(val <= 0){
        td.textContent = '—';
      } else {
        const pct = val * 100;
        td.textContent = pct < 0.001 ? pct.toFixed(4) + '%'
                       : pct < 0.1   ? pct.toFixed(3) + '%'
                       : pct < 10    ? pct.toFixed(2) + '%'
                       :               pct.toFixed(1) + '%';
      }
      return td;
    };

    const tdCell = oddsMode
      ? (val, bold) => tdOdds(val, bold)
      : (val, bold) => tdPay(val, bold);

    // ── Table ─────────────────────────────────────────────
    const tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;min-width:600px;';

    const thead = tbl.createTHead();
    const hr    = thead.insertRow();
    const addTH = (text, extra='') => {
      const th = document.createElement('th');
      th.textContent = text;
      th.style.cssText = thStyle(extra);
      hr.appendChild(th);
    };
    addTH('#',            'width:24px;text-align:center;');
    addTH('Cards to Hold','text-align:left;min-width:90px;');
    addTH('Total',        'border-right:1px solid #2a4a9a;');
    HAND_COLS.forEach(c => addTH(c.label));

    const tbody = tbl.createTBody();
    shown.forEach(({combo, rank}, ri) => {
      const isPlayer = combo.mask === playerMask;
      const row = tbody.insertRow();
      row.style.cssText = isPlayer
        ? 'background:rgba(240,192,64,0.13);'
        : (ri%2===0 ? '' : 'background:rgba(255,255,255,0.03);');
      // Appended out-of-top-8 player row gets a separator border
      if(rank > 8) row.style.borderTop = '2px solid #2a4a9a';

      // # cell — actual rank among all 32 holds
      const rnkTd = row.insertCell();
      rnkTd.textContent = rank;
      rnkTd.style.cssText = 'text-align:center;padding:5px 4px;font-weight:bold;color:#f0c040;font-size:18px;';

      // Hold label
      const holdTd = row.insertCell();
      let label;
      if(combo.mask === 0b11111) label = 'Hold all 5';
      else if(combo.mask === 0)  label = 'Draw 5 new';
      else label = combo.heldCards.map(cardLabel).join(' ');
      holdTd.style.cssText = `padding:5px 4px;font-size:17px;white-space:nowrap;` +
        (isPlayer ? 'color:#f0c040;font-weight:bold;' : 'color:#c0c8d8;');
      holdTd.textContent = label + (isPlayer ? ' ← you' : '');

      // Total cell
      const totVal = oddsMode
        ? HAND_COLS.reduce((s, c) => s + combo.handOdds[c.idx], 0)
        : combo.ev;
      const totTd = tdCell(totVal, true);
      totTd.style.borderRight = '1px solid #2a4a9a';
      row.appendChild(totTd);

      // Per-hand columns
      HAND_COLS.forEach(c => row.appendChild(
        tdCell(oddsMode ? combo.handOdds[c.idx] : combo.handEV[c.idx], false)
      ));
    });

    // Footer
    const footer = document.createElement('div');
    footer.style.cssText = 'text-align:center;font-size:15px;color:#8899bb;padding:6px 0 2px;';
    if(isCustom){
      footer.textContent = 'Hypothetical hand — best holds ranked from all 32 options';
    } else if(playerRank === 1){
      footer.textContent = '✓ Optimal hold selected';
      footer.style.color = '#3cdc64';
    } else {
      footer.textContent = `Your hold ranks #${playerRank} of 32`;
    }

    content.innerHTML = '';
    content.appendChild(tbl);
    content.appendChild(footer);
  }

  // Toggle handler — flips mode and rerenders without recomputing
  toggleBtn.addEventListener('click', () => {
    oddsMode = !oddsMode;
    applyToggleStyle();
    if(lastRanked) render(lastRanked);
  });

  // Compute in the worker on button press; modal renders (and stays
  // responsive) while it runs. Reuses the trainer's result if ready.
  if(isCustom){
    analyzeHandAsync(customHand, customDeck).then(results => {
      if(overlay.parentNode) render(results);
    });
  } else if(analysisResults){
    setTimeout(() => render(analysisResults), 30);
  } else {
    const p = analysisPromise || startAnalysisAsync();
    const token = analysisToken;   // capture AFTER starting (start bumps it)
    p.then(results => {
      if(overlay.parentNode && token === analysisToken) render(results);
    });
  }
}

// ════════════════════════════════════════════════════════════
//  ANALYZE-A-HAND PICKER
//  Ten quick presses: rank then suit, five times over. Feeds the
//  chosen hand into the same EV analysis screen as the Analyze button.
// ════════════════════════════════════════════════════════════
function showHandPicker(){
  sfx.button();
  const cards = [];
  let pendingRank = null;

  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed','inset:0','z-index:10000',
    'background:rgba(0,5,25,0.9)',
    'display:flex','align-items:center','justify-content:center',
    'font-family:Arial,Helvetica,sans-serif',
  ].join(';');

  const panel = document.createElement('div');
  panel.style.cssText = [
    'background:linear-gradient(180deg,#0d2255 0%,#091840 100%)',
    'border:2px solid #2a4a9a','border-radius:14px',
    'box-shadow:0 0 30px rgba(20,60,180,0.6)',
    'padding:18px 22px','width:min(520px,94vw)',
    'display:flex','flex-direction:column','gap:14px','align-items:center',
  ].join(';');

  const title = document.createElement('div');
  title.style.cssText = 'font-size:16px;font-weight:bold;color:#f0c040;letter-spacing:3px;text-transform:uppercase;';
  title.textContent = 'Analyze a Hand';

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:#8899bb;text-align:center;';
  hint.textContent = 'Tap a rank, then a suit — five times. (' + curGame().name + ')';

  // ── Five card slots ─────────────────────────────────────
  const slotsRow = document.createElement('div');
  slotsRow.style.cssText = 'display:flex;gap:8px;';
  const slots = [];
  for(let i=0;i<5;i++){
    const s = document.createElement('div');
    s.style.cssText = [
      'width:58px','height:78px','border:2px dashed #3a5aaa','border-radius:8px',
      'background:#0a1a40','display:flex','align-items:center','justify-content:center',
      'font-size:20px','font-weight:bold','color:#c0c8d8',
    ].join(';');
    slots.push(s);
    slotsRow.appendChild(s);
  }

  const status = document.createElement('div');
  status.style.cssText = 'font-size:12px;color:#ff8080;min-height:15px;';

  // ── Rank buttons ────────────────────────────────────────
  const rankRow = document.createElement('div');
  rankRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;justify-content:center;';
  const rankBtns = {};
  const mkBtn = (label, wide) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = [
      'font-family:Arial,Helvetica,sans-serif','font-size:15px','font-weight:bold',
      `min-width:${wide ? 64 : 40}px`,'padding:9px 4px',
      'background:#1a2a60','border:2px solid #3a5aaa','border-radius:7px',
      'color:#e0e8f8','cursor:pointer','touch-action:manipulation',
    ].join(';');
    return b;
  };
  RANKS.forEach(r => {
    const b = mkBtn(r);
    b.addEventListener('click', () => {
      if(cards.length >= 5) return;
      pendingRank = r;
      sfx.hold();
      refresh();
    });
    rankBtns[r] = b;
    rankRow.appendChild(b);
  });
  if(curGame().joker){
    const b = mkBtn('JOKER', true);
    b.addEventListener('click', () => {
      if(cards.length >= 5) return;
      if(cards.some(c => c.joker)){ status.textContent = 'The joker is already in the hand.'; return; }
      cards.push({ rank:'JOKER', suit:'★', joker:true });
      pendingRank = null;
      status.textContent = '';
      sfx.hold();
      refresh();
    });
    rankBtns.JOKER = b;
    rankRow.appendChild(b);
  }

  // ── Suit buttons ────────────────────────────────────────
  const suitRow = document.createElement('div');
  suitRow.style.cssText = 'display:flex;gap:8px;justify-content:center;';
  const suitBtns = [];
  SUITS.forEach(s => {
    const b = mkBtn(s, true);
    b.style.fontSize = '26px';
    b.style.color = SUIT_COLOR[s] === 'red' ? '#ff6060' : '#e0e8f8';
    b.addEventListener('click', () => {
      if(!pendingRank || cards.length >= 5) return;
      if(cards.some(c => c.rank === pendingRank && c.suit === s)){
        status.textContent = pendingRank + s + ' is already in the hand.';
        sfx.thump();
        return;
      }
      cards.push({ rank: pendingRank, suit: s });
      pendingRank = null;
      status.textContent = '';
      sfx.hold();
      refresh();
    });
    suitBtns.push(b);
    suitRow.appendChild(b);
  });

  // ── Action buttons ──────────────────────────────────────
  const actRow = document.createElement('div');
  actRow.style.cssText = 'display:flex;gap:10px;justify-content:center;flex-wrap:wrap;';
  const mkAct = (label, bg, border, color) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = [
      'font-family:Arial,Helvetica,sans-serif','font-size:13px','font-weight:bold',
      'letter-spacing:1px','text-transform:uppercase','padding:9px 20px',
      `background:${bg}`,`border:2px solid ${border}`,'border-radius:8px',
      `color:${color}`,'cursor:pointer','touch-action:manipulation',
    ].join(';');
    return b;
  };
  const backBtn    = mkAct('Back','linear-gradient(180deg,#3a3a3a,#1a1a1a)','#666','#ccc');
  const analyzeBtn = mkAct('Analyze','linear-gradient(180deg,#7a6a00,#4a4000)','#ccaa00','#ffee88');
  const cancelBtn  = mkAct('Cancel','linear-gradient(180deg,#6a1a1a,#4a0a0a)','#cc4444','#ffaaaa');

  const close = () => { if(overlay.parentNode) overlay.parentNode.removeChild(overlay); };

  backBtn.addEventListener('click', () => {
    if(pendingRank) pendingRank = null;
    else cards.pop();
    status.textContent = '';
    refresh();
  });
  cancelBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target === overlay) close(); });

  analyzeBtn.addEventListener('click', () => {
    if(cards.length !== 5) return;
    const remaining = fullDeckFor().filter(c =>
      !cards.some(x => x.rank === c.rank && x.suit === c.suit));
    close();
    showAnalysis(cards.slice(), remaining);
  });

  // ── State refresh ───────────────────────────────────────
  function refresh(){
    slots.forEach((s, i) => {
      if(cards[i]){
        const c = cards[i];
        s.textContent = c.joker ? '🃏' : c.rank + '\n' + c.suit;
        s.innerHTML = c.joker
          ? '<span style="font-size:30px">★</span>'
          : `<span style="color:${SUIT_COLOR[c.suit]==='red' ? '#ff6060' : '#fff'}">${c.rank}<br>${c.suit}</span>`;
        s.style.border = '2px solid #f0c040';
      } else if(i === cards.length && pendingRank){
        s.innerHTML = `<span style="color:#f0c040">${pendingRank}<br>?</span>`;
        s.style.border = '2px dashed #f0c040';
      } else {
        s.innerHTML = '';
        s.style.border = '2px dashed #3a5aaa';
      }
    });
    Object.entries(rankBtns).forEach(([r, b]) => {
      const active = r === pendingRank;
      b.style.background  = active ? 'linear-gradient(180deg,#c89a20,#a07a10)' : '#1a2a60';
      b.style.color       = active ? '#000' : (r === 'JOKER' ? '#ffd780' : '#e0e8f8');
      b.style.borderColor = active ? '#f0c040' : '#3a5aaa';
      b.disabled = cards.length >= 5;
      b.style.opacity = cards.length >= 5 ? 0.4 : 1;
    });
    suitBtns.forEach(b => {
      const usable = !!pendingRank && cards.length < 5;
      b.disabled = !usable;
      b.style.opacity = usable ? 1 : 0.35;
    });
    analyzeBtn.disabled = cards.length !== 5;
    analyzeBtn.style.opacity = cards.length === 5 ? 1 : 0.4;
  }
  refresh();

  actRow.appendChild(backBtn);
  actRow.appendChild(analyzeBtn);
  actRow.appendChild(cancelBtn);
  panel.appendChild(title);
  panel.appendChild(hint);
  panel.appendChild(slotsRow);
  panel.appendChild(status);
  panel.appendChild(rankRow);
  panel.appendChild(suitRow);
  panel.appendChild(actRow);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

// ════════════════════════════════════════════════════════════
//  SETTINGS MODAL
// ════════════════════════════════════════════════════════════
function showSettings() {
  // Slider range mapping helpers
  // Card Flip Speed: 0–100 maps to 0–800 ms  (at 70% → 560 ms default)
  // Deal Delay:      0–100 maps to 0–500 ms  (at 70% → 350 ms default)
  const FLIP_MAX  = 800;
  const DELAY_MAX = 500;
  const toSlider  = (val, max) => Math.round(val / max * 100);
  const fromSlider = (pct, max) => Math.round(pct / 100 * max);

  // ── Overlay ──────────────────────────────────────────────
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed','inset:0','z-index:9999',
    'background:rgba(0,5,25,0.88)',
    'display:flex','align-items:center','justify-content:center',
    'font-family:Arial,Helvetica,sans-serif',
  ].join(';');

  // ── Panel ────────────────────────────────────────────────
  const panel = document.createElement('div');
  panel.style.cssText = [
    'background:linear-gradient(180deg,#0d2255 0%,#091840 100%)',
    'border:2px solid #2a4a9a','border-radius:14px',
    'box-shadow:0 0 30px rgba(20,60,180,0.6)',
    'padding:20px 28px','width:min(480px,92vw)',
    'display:flex','flex-direction:column','gap:22px',
  ].join(';');

  // ── Title ────────────────────────────────────────────────
  const title = document.createElement('div');
  title.style.cssText = [
    'text-align:center','font-size:18px','font-weight:bold',
    'color:#f0c040','letter-spacing:4px','text-transform:uppercase',
    'text-shadow:0 0 8px rgba(240,192,64,0.5)',
  ].join(';');
  title.textContent = '⚙  Settings';

  // ── Slider builder ───────────────────────────────────────
  function makeSlider(labelText, currentVal, max, onChange) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

    // Label row: name on left, current value on right
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;';

    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:15px;font-weight:bold;color:#c0c8d8;letter-spacing:1px;';
    lbl.textContent = labelText;

    const valDisplay = document.createElement('div');
    valDisplay.style.cssText = 'font-size:13px;color:#f0c040;font-weight:bold;min-width:60px;text-align:right;';
    valDisplay.textContent = currentVal === 0 ? 'Instant' : currentVal + ' ms';

    topRow.appendChild(lbl);
    topRow.appendChild(valDisplay);

    // Slider
    const slider = document.createElement('input');
    slider.type  = 'range';
    slider.min   = '0';
    slider.max   = '100';
    slider.value = String(toSlider(currentVal, max));
    slider.style.cssText = [
      'width:100%','accent-color:#f0c040','height:6px',
      'cursor:pointer','touch-action:manipulation',
    ].join(';');

    slider.addEventListener('input', () => {
      const ms = fromSlider(parseInt(slider.value), max);
      valDisplay.textContent = ms === 0 ? 'Instant' : ms + ' ms';
      onChange(ms);
    });

    // End labels
    const endRow = document.createElement('div');
    endRow.style.cssText = 'display:flex;justify-content:space-between;';
    const mkEnd = t => {
      const s = document.createElement('span');
      s.style.cssText = 'font-size:11px;color:#6a7a9a;';
      s.textContent = t;
      return s;
    };
    endRow.appendChild(mkEnd(labelText === 'Card Flip Speed' ? 'Instant' : 'No Delay'));
    endRow.appendChild(mkEnd('Slow'));

    wrap.appendChild(topRow);
    wrap.appendChild(slider);
    wrap.appendChild(endRow);
    return wrap;
  }

  // ── Option-row builder: label + a row of choice buttons ──
  function makeToggleRow(labelText, options, getVal, setVal){
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;';

    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:15px;font-weight:bold;color:#c0c8d8;letter-spacing:1px;';
    lbl.textContent = labelText;

    const btns = document.createElement('div');
    btns.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;';

    const els = [];
    const refresh = () => els.forEach(({b, value}) => {
      const on = getVal() === value;
      b.style.background  = on ? 'linear-gradient(180deg,#c89a20,#a07a10)' : '#1a2a60';
      b.style.color       = on ? '#000' : '#c0c8d8';
      b.style.borderColor = on ? '#f0c040' : '#3a5aaa';
    });
    options.forEach(o => {
      const b = document.createElement('button');
      b.textContent = o.label;
      b.style.cssText = [
        'font-family:Arial,Helvetica,sans-serif','font-size:12px','font-weight:bold',
        'padding:6px 12px','border:2px solid #3a5aaa','border-radius:6px',
        'background:#1a2a60','color:#c0c8d8','cursor:pointer','touch-action:manipulation',
      ].join(';');
      b.addEventListener('click', () => { setVal(o.value); refresh(); });
      els.push({ b, value: o.value });
      btns.appendChild(b);
    });
    refresh();
    wrap.appendChild(lbl);
    wrap.appendChild(btns);
    return wrap;
  }

  // ── History CSV section ──────────────────────────────────
  const histSection = document.createElement('div');
  histSection.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  const histLabel = document.createElement('div');
  histLabel.style.cssText = 'font-size:15px;font-weight:bold;color:#c0c8d8;letter-spacing:1px;';
  histLabel.textContent = 'History';
  histSection.appendChild(histLabel);

  const histBtnRow = document.createElement('div');
  histBtnRow.style.cssText = 'display:flex;gap:10px;';

  // Download History button
  const dlBtn = document.createElement('button');
  dlBtn.textContent = 'Download History';
  dlBtn.style.cssText = [
    'flex:1','font-family:Arial,Helvetica,sans-serif','font-size:13px',
    'font-weight:bold','letter-spacing:1px','text-transform:uppercase',
    'padding:8px 12px',
    'background:linear-gradient(180deg,#1a6a2a,#0e4018)',
    'border:2px solid #3acc5a','border-radius:8px',
    'color:#aaffbb','cursor:pointer','touch-action:manipulation',
  ].join(';');
  dlBtn.addEventListener('click', () => {
    if (handHistory.length === 0) { alert('No history to download.'); return; }
    const lines = ['entry,credits,delta,type,result,suboptimal,optDelta,optResult,bet'];
    handHistory.forEach((h, i) => {
      const sub = h.sub === true ? 1 : h.sub === false ? 0 : '';
      const opt = typeof h.opt === 'number' ? h.opt : '';
      const bet = typeof h.bet === 'number' ? h.bet : '';
      lines.push(`${i+1},${h.credits},${h.delta},${h.type},${h.res||''},${sub},${opt},${h.optRes||''},${bet}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'video-poker-history.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Upload History button + hidden file input
  const ulBtn = document.createElement('button');
  ulBtn.textContent = 'Upload History';
  ulBtn.style.cssText = [
    'flex:1','font-family:Arial,Helvetica,sans-serif','font-size:13px',
    'font-weight:bold','letter-spacing:1px','text-transform:uppercase',
    'padding:8px 12px',
    'background:linear-gradient(180deg,#5a4a1a,#3a2e0a)',
    'border:2px solid #ccaa3a','border-radius:8px',
    'color:#ffe880','cursor:pointer','touch-action:manipulation',
  ].join(';');

  const fileInput = document.createElement('input');
  fileInput.type   = 'file';
  fileInput.accept = '.csv,text/csv';
  fileInput.style.cssText = 'display:none;';
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const rows = e.target.result.split(/\r?\n/).filter(r => r.trim());
        // Expect header: entry,credits,delta,type
        if (rows.length < 2) { alert('CSV appears empty.'); return; }
        const parsed = [];
        for (let i = 1; i < rows.length; i++) {
          const cols = rows[i].split(',');
          if (cols.length < 4) continue;
          const credits = parseFloat(cols[1]);
          const delta   = parseFloat(cols[2]);
          const type    = cols[3].trim();
          if (isNaN(credits) || isNaN(delta)) continue;
          if (!['hand','add','reset'].includes(type)) continue;
          const e = { credits, delta, type };
          // Optional extended columns (result, suboptimal flag, counterfactual)
          if (cols[4] && cols[4].trim())      e.res = cols[4].trim();
          if (cols[5] === '1')                e.sub = true;
          else if (cols[5] === '0')           e.sub = false;
          const opt = parseFloat(cols[6]);
          if (!isNaN(opt))                    e.opt = opt;
          if (cols[7] && cols[7].trim())      e.optRes = cols[7].trim();
          const bet = parseInt(cols[8], 10);
          if (!isNaN(bet) && bet >= 1 && bet <= 5) e.bet = bet;
          parsed.push(e);
        }
        if (parsed.length === 0) { alert('No valid entries found in CSV.'); return; }
        if (!confirm(`Replace current history with ${parsed.length} imported entries?`)) return;
        handHistory = parsed.slice(-1000);
        graphRangeStart = 1;
        saveState();
        alert(`Imported ${handHistory.length} entries successfully.`);
      } catch(err) {
        alert('Failed to parse CSV: ' + err.message);
      }
      fileInput.value = '';
    };
    reader.readAsText(file);
  });
  ulBtn.addEventListener('click', () => fileInput.click());

  histBtnRow.appendChild(dlBtn);
  histBtnRow.appendChild(ulBtn);
  histSection.appendChild(histBtnRow);
  document.body.appendChild(fileInput); // keep in DOM for file dialog

  // ── Done button ──────────────────────────────────────────
  const doneBtn = document.createElement('button');
  doneBtn.textContent = 'Done';
  doneBtn.style.cssText = [
    'align-self:center',
    'font-family:Arial,Helvetica,sans-serif','font-size:14px',
    'font-weight:bold','letter-spacing:2px','text-transform:uppercase',
    'padding:9px 32px',
    'background:linear-gradient(180deg,#2a4aaa,#1a2a7a)',
    'border:2px solid #5a7acc','border-radius:8px',
    'color:#fff','cursor:pointer','touch-action:manipulation',
  ].join(';');

  const close = () => {
    if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
    if(fileInput.parentNode) fileInput.parentNode.removeChild(fileInput);
  };
  doneBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

  // ── Assemble ─────────────────────────────────────────────
  panel.appendChild(title);
  panel.appendChild(makeSlider('Card Flip Speed', flipDuration, FLIP_MAX, ms => {
    flipDuration = ms;
    applyAnimSettings();
    saveState();
  }));
  panel.appendChild(makeSlider('Deal Delay', dealDelay, DELAY_MAX, ms => {
    dealDelay = ms;
    saveState();
  }));

  // Pay table for the current game (change only between hands)
  panel.appendChild(makeToggleRow(
    'Pay Table — ' + curGame().name,
    curGame().payTables.map((p, i) => ({ label: p.label, value: i })),
    () => payTableIdx,
    i => {
      if(phase === 'holding'){ alert('Finish the current hand before changing the pay table.'); return; }
      payTableIdx = i;
      invalidateAnalysis();
      saveState();
      buildPayTable();
    }
  ));

  // Look & feel: retro-modern vs authentic Game King
  panel.appendChild(makeToggleRow(
    'Look & Feel',
    [{ label:'Modern', value:'modern' }, { label:'Classic', value:'classic' }],
    () => theme,
    v => {
      theme = v;
      applyTheme();
      buildPayTable();      // classic and modern use different pay-table layouts
      updateInfoRow();
      document.querySelectorAll('.hold-badge').forEach(b => b.textContent = holdLabel());
      saveState();
      setTimeout(rescale, 30);   // classic layout has a different natural height
    }
  ));

  // Sounds
  panel.appendChild(makeToggleRow(
    'Sounds',
    [{ label:'On', value:true }, { label:'Off', value:false }],
    () => soundOn,
    v => { soundOn = v; saveState(); if(v) sfx.win(); }
  ));

  // Hold trainer: thump + one retry on a non-optimal hold
  panel.appendChild(makeToggleRow(
    'Hold Trainer',
    [{ label:'On', value:true }, { label:'Off', value:false }],
    () => trainerOn,
    v => {
      trainerOn = v;
      trainerWarned = false;
      saveState();
      if(v && phase === 'holding' && !analysisResults) startAnalysisAsync();
    }
  ));

  // ── Analyze a Hand: pick any five cards, see the full EV table ──
  const pickBtn = document.createElement('button');
  pickBtn.textContent = 'Analyze a Hand';
  pickBtn.style.cssText = [
    'font-family:Arial,Helvetica,sans-serif','font-size:13px','font-weight:bold',
    'letter-spacing:1px','text-transform:uppercase','padding:9px 12px',
    'background:linear-gradient(180deg,#7a6a00,#4a4000)',
    'border:2px solid #ccaa00','border-radius:8px',
    'color:#ffee88','cursor:pointer','touch-action:manipulation',
  ].join(';');
  pickBtn.addEventListener('click', showHandPicker);
  panel.appendChild(pickBtn);

  panel.appendChild(histSection);
  panel.appendChild(doneBtn);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

// ════════════════════════════════════════════════════════════
//  GRAPH MODAL
// ════════════════════════════════════════════════════════════
function showGraph(){
  const history = handHistory.slice();   // full copy, up to 1000

  // ── Overlay ──────────────────────────────────────────────
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed','inset:0','z-index:9999',
    'background:rgba(0,5,25,0.88)',
    'display:flex','align-items:center','justify-content:center',
    'font-family:Arial,Helvetica,sans-serif',
  ].join(';');

  // ── Panel ────────────────────────────────────────────────
  const panel = document.createElement('div');
  panel.style.cssText = [
    'background:linear-gradient(180deg,#0d2255 0%,#091840 100%)',
    'border:2px solid #2a4a9a',
    'border-radius:14px',
    'box-shadow:0 0 30px rgba(20,60,180,0.6)',
    'padding:16px',
    'width:min(1040px,96vw)',
    'display:flex','flex-direction:column','gap:10px',
  ].join(';');

  // ── Range state (1-based, inclusive) ─────────────────────
  // Start defaults to last saved position; End always defaults to most recent entry
  let rangeStart = Math.min(graphRangeStart, history.length || 1);
  let rangeEnd   = history.length;

  // ── Title ─────────────────────────────────────────────────
  const title = document.createElement('div');
  title.style.cssText = [
    'text-align:center','font-size:16px','font-weight:bold',
    'color:#f0c040','letter-spacing:3px','text-transform:uppercase',
    'text-shadow:0 0 8px rgba(240,192,64,0.5)',
  ].join(';');

  function updateTitle(){
    const total = history.length;
    const shown = rangeEnd - rangeStart + 1;
    const gname = curGame().name;
    title.textContent = total === 0
      ? `${gname} History — No Entries`
      : rangeStart === 1 && rangeEnd === total
        ? `${gname} History — ${total} Entr${total!==1?'ies':'y'}`
        : `${gname} History — Entries ${rangeStart}–${rangeEnd} of ${total}`;
  }
  updateTitle();

  // ── Canvas ────────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  const cw = Math.min(1000, Math.round(window.innerWidth * 0.92));
  canvas.width  = cw;
  canvas.height = Math.round(Math.min(cw * 0.48, window.innerHeight * 0.58));
  canvas.style.cssText = 'width:100%;height:auto;display:block;border-radius:6px;touch-action:none;';

  let hoverIdx = null;   // slice index under the finger/cursor
  let altSel   = [];     // pay-table indices selected for comparison lines

  function redraw(){
    updateTitle();
    const slice = history.slice(rangeStart-1, rangeEnd);
    drawGraph(canvas, slice, rangeStart - 1, hoverIdx, altSel);
  }

  // ── Pointer → canvas coordinate helpers ───────────────────
  const PAD = { top:28, right:20, bottom:38, left:68 };   // must match drawGraph
  function canvasX(clientX){
    const r = canvas.getBoundingClientRect();
    return (clientX - r.left) * (canvas.width / r.width);
  }
  function chartW(){ return canvas.width - PAD.left - PAD.right; }
  // Entry index (in the current slice) nearest to canvas x
  function sliceIdxAt(cx){
    const n = rangeEnd - rangeStart + 1;
    if(n <= 0) return null;
    if(n === 1) return 0;
    const f = (cx - PAD.left) / chartW() * (n - 1);
    return Math.max(0, Math.min(n - 1, Math.round(f)));
  }

  // ── Two-finger pinch-zoom / pan  +  one-finger result readout ──
  let pinch = null;
  canvas.addEventListener('touchstart', e => {
    if(e.touches.length === 2){
      e.preventDefault();
      hoverIdx = null;
      const x1 = canvasX(e.touches[0].clientX), x2 = canvasX(e.touches[1].clientX);
      const span = rangeEnd - rangeStart;      // entries spanned (0-based)
      const cx = (x1 + x2) / 2;
      pinch = {
        dist: Math.max(20, Math.abs(x2 - x1)),
        // data-space anchor: the entry index under the initial midpoint
        anchor: rangeStart + (cx - PAD.left) / chartW() * span,
        span,
      };
    } else if(e.touches.length === 1 && history.length){
      hoverIdx = sliceIdxAt(canvasX(e.touches[0].clientX));
      redraw();
    }
  }, { passive:false });

  canvas.addEventListener('touchmove', e => {
    if(e.touches.length === 2 && pinch){
      e.preventDefault();
      const total = history.length;
      const x1 = canvasX(e.touches[0].clientX), x2 = canvasX(e.touches[1].clientX);
      const dist = Math.max(20, Math.abs(x2 - x1));
      const cx   = (x1 + x2) / 2;
      // New span: pinch out → zoom in (span shrinks); pinch in → zoom out
      let span = Math.round(pinch.span * pinch.dist / dist);
      span = Math.max(1, Math.min(total - 1, span));
      // Keep the anchored entry under the fingers' current midpoint (pans too)
      const frac = (cx - PAD.left) / chartW();
      let s = Math.round(pinch.anchor - frac * span);
      s = Math.max(1, Math.min(total - span, s));
      rangeStart = s;
      rangeEnd   = Math.min(total, s + span);
      redraw();
    } else if(e.touches.length === 1 && history.length){
      e.preventDefault();
      hoverIdx = sliceIdxAt(canvasX(e.touches[0].clientX));
      redraw();
    }
  }, { passive:false });

  canvas.addEventListener('touchend', e => {
    if(e.touches.length < 2 && pinch){
      pinch = null;
      graphRangeStart = rangeStart;   // persist the zoomed position
      saveState();
    }
    if(e.touches.length === 0 && hoverIdx !== null){
      hoverIdx = null;
      redraw();
    }
  });

  // Desktop: mouse hover shows the same readout
  canvas.addEventListener('mousemove', e => {
    if(!history.length) return;
    hoverIdx = sliceIdxAt(canvasX(e.clientX));
    redraw();
  });
  canvas.addEventListener('mouseleave', () => { hoverIdx = null; redraw(); });

  // ── Button row ────────────────────────────────────────────
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;justify-content:center;flex-wrap:wrap;';

  function makeModalBtn(label, bg, border, color){
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = [
      `font-family:Arial,Helvetica,sans-serif`,
      `font-size:12px`,`font-weight:bold`,`letter-spacing:1px`,
      `text-transform:uppercase`,`padding:7px 18px`,
      `background:${bg}`,`border:2px solid ${border}`,
      `border-radius:7px`,`color:${color}`,
      `cursor:pointer`,`touch-action:manipulation`,
    ].join(';');
    return b;
  }

  // Range button
  const rangeBtn = makeModalBtn('Range','linear-gradient(180deg,#1a6a6a,#0e4444)','#3acccc','#aaffff');
  rangeBtn.addEventListener('click', () => {
    const total = history.length;
    if(total === 0){ alert('No entries to filter.'); return; }
    const s = parseInt(prompt(`Start entry (1–${total}):`, rangeStart), 10);
    if(isNaN(s) || s < 1 || s > total){ alert('Invalid start entry.'); return; }
    const e = parseInt(prompt(`End entry (${s}–${total}):`, Math.min(rangeEnd, total)), 10);
    if(isNaN(e) || e < s || e > total){ alert('Invalid end entry.'); return; }
    rangeStart = s;
    rangeEnd   = e;
    graphRangeStart = s;
    saveState();
    redraw();
  });

  // Reset range button (show all)
  const allBtn = makeModalBtn('Show All','linear-gradient(180deg,#2a4aaa,#1a2a7a)','#5a7acc','#fff');
  allBtn.addEventListener('click', () => {
    rangeStart = 1;
    rangeEnd   = history.length || 1;
    graphRangeStart = 1;
    saveState();
    redraw();
  });

  // Pay-table comparison button — pick alternate tables to overlay
  const cmpBtn = makeModalBtn('Pay Tables','linear-gradient(180deg,#5a2a8a,#3a1a6a)','#aa66dd','#ddb8ff');
  cmpBtn.addEventListener('click', () => {
    const tables = curGame().payTables;
    const ov2 = document.createElement('div');
    ov2.style.cssText = [
      'position:fixed','inset:0','z-index:10000',
      'background:rgba(0,5,25,0.7)',
      'display:flex','align-items:center','justify-content:center',
      'font-family:Arial,Helvetica,sans-serif',
    ].join(';');
    const p2 = document.createElement('div');
    p2.style.cssText = [
      'background:linear-gradient(180deg,#0d2255 0%,#091840 100%)',
      'border:2px solid #2a4a9a','border-radius:12px',
      'box-shadow:0 0 24px rgba(20,60,180,0.6)',
      'padding:18px 22px','width:min(360px,90vw)',
      'display:flex','flex-direction:column','gap:12px',
    ].join(';');
    const t2 = document.createElement('div');
    t2.style.cssText = 'text-align:center;font-size:14px;font-weight:bold;color:#f0c040;letter-spacing:2px;text-transform:uppercase;';
    t2.textContent = 'Compare Pay Tables';
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:#8899bb;text-align:center;';
    note.textContent = 'Overlay what your credits would be under other ' +
                       curGame().name + ' pay tables casinos offer, from the first visible point.';
    p2.appendChild(t2);
    p2.appendChild(note);

    const ALT_COLORS = ['#ff4fd8','#ffa040','#8dff5a','#c084fc'];
    tables.forEach((t, i) => {
      const row = document.createElement('label');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;color:#e0e8f8;font-size:14px;cursor:pointer;';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = altSel.includes(i);
      cb.style.cssText = 'width:17px;height:17px;accent-color:#aa66dd;';
      cb.addEventListener('change', () => {
        altSel = cb.checked ? [...altSel, i] : altSel.filter(x => x !== i);
        redraw();
      });
      const sw = document.createElement('span');
      sw.style.cssText = `display:inline-block;width:18px;height:4px;border-radius:2px;background:${ALT_COLORS[i % ALT_COLORS.length]};`;
      const txt = document.createElement('span');
      txt.textContent = t.label + (i === payTableIdx ? '  (current)' : '');
      row.appendChild(cb);
      row.appendChild(sw);
      row.appendChild(txt);
      p2.appendChild(row);
    });

    const done2 = makeModalBtn('Done','linear-gradient(180deg,#2a4aaa,#1a2a7a)','#5a7acc','#fff');
    done2.style.alignSelf = 'center';
    const close2 = () => { if(ov2.parentNode) ov2.parentNode.removeChild(ov2); };
    done2.addEventListener('click', close2);
    ov2.addEventListener('click', e => { if(e.target === ov2) close2(); });
    p2.appendChild(done2);
    ov2.appendChild(p2);
    document.body.appendChild(ov2);
  });

  // Optimal-line toggle
  const optBtn = makeModalBtn('', 'linear-gradient(180deg,#155a8a,#0c3a5c)', '#38b6ff', '#a8dcff');
  const optLabel = () => { optBtn.textContent = graphShowOpt ? 'Optimal: On' : 'Optimal: Off'; };
  optLabel();
  optBtn.addEventListener('click', () => {
    graphShowOpt = !graphShowOpt;
    optLabel();
    saveState();
    redraw();
  });

  // Clear history button
  const clearBtn = makeModalBtn('Reset Log','linear-gradient(180deg,#8a2020,#601414)','#cc4444','#ffaaaa');
  clearBtn.addEventListener('click', () => {
    if(!confirm('Clear all session history? This cannot be undone.')) return;
    handHistory = [];
    graphRangeStart = 1;
    saveState();
    history.splice(0);     // clear the local copy too
    rangeStart = 1;
    rangeEnd   = 0;
    redraw();
  });

  // Close button
  const closeBtn = makeModalBtn('Close','linear-gradient(180deg,#3a3a3a,#1a1a1a)','#666','#ccc');
  const close = () => { if(overlay.parentNode) overlay.parentNode.removeChild(overlay); };
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

  btnRow.appendChild(rangeBtn);
  btnRow.appendChild(allBtn);
  btnRow.appendChild(optBtn);
  btnRow.appendChild(cmpBtn);
  btnRow.appendChild(clearBtn);
  btnRow.appendChild(closeBtn);

  panel.appendChild(title);
  panel.appendChild(canvas);
  panel.appendChild(btnRow);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);

  redraw();
}

// ── Canvas chart ─────────────────────────────────────────────
// offset   = index of history[0] in the full handHistory array
// hoverIdx = slice index to highlight with a crosshair + readout (or null)
// altIdxs  = pay-table indices of the current game to overlay as
//            what-if lines (each hand re-priced under that table)
function drawGraph(canvas, history, offset=0, hoverIdx=null, altIdxs=[]){
  const ctx  = canvas.getContext('2d');
  const W    = canvas.width;
  const H    = canvas.height;
  const pad  = { top:28, right:20, bottom:38, left:68 };
  const cW   = W - pad.left - pad.right;
  const cH   = H - pad.top  - pad.bottom;
  const denom = DENOMINATIONS[denomIdx].value;

  // Background
  ctx.fillStyle = '#040d22';
  ctx.fillRect(0, 0, W, H);

  if(history.length === 0){
    ctx.fillStyle    = '#f0c040';
    ctx.font         = 'bold 15px Arial';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No hands played yet — deal a few hands first!', W/2, H/2);
    return;
  }

  const values = history.map(h => h.credits);

  // ── Optimal-play line ───────────────────────────────────
  // Anchored to the leftmost VISIBLE point, then accumulates each hand's
  // optimal-hold counterfactual result instead of the actual result.
  // Hands without recorded counterfactuals fall back to the actual delta;
  // credit adds apply equally; resets re-sync to the actual value.
  const optValues = [values[0]];
  for(let i=1; i<history.length; i++){
    const h = history[i];
    if(h.type === 'hand')     optValues.push(optValues[i-1] + (typeof h.opt === 'number' ? h.opt : h.delta));
    else if(h.type === 'add') optValues.push(optValues[i-1] + (h.delta || 0));
    else                      optValues.push(values[i]);
  }
  const optDiffers = optValues.some((v,i) => v !== values[i]);
  const showOpt    = graphShowOpt && optDiffers;   // line can be toggled off
  const hasSub     = history.some(h => h.type === 'hand' && h.sub === true);

  // ── Alternate pay-table lines ──────────────────────────
  // Each selected table re-prices every visible hand (result name + bet →
  // that table's payout), anchored to the leftmost visible point. Hands
  // without recorded result/bet fall back to the actual delta.
  const ALT_COLORS = ['#ff4fd8','#ffa040','#8dff5a','#c084fc'];
  const tables = curGame().payTables;
  const altLines = (altIdxs || []).filter(ti => tables[ti]).map(ti => {
    const rows = tables[ti].rows;
    const vals = [values[0]];
    for(let i=1; i<history.length; i++){
      const h = history[i];
      if(h.type === 'hand'){
        let d = h.delta;
        if(h.res && typeof h.bet === 'number'){
          const cat = rows.findIndex(r => r.name === h.res);
          if(cat >= 0) d = rows[cat].pays[h.bet-1] - h.bet;
        }
        vals.push(vals[i-1] + d);
      }
      else if(h.type === 'add') vals.push(vals[i-1] + (h.delta || 0));
      else                      vals.push(values[i]);
    }
    return { vals, color: ALT_COLORS[ti % ALT_COLORS.length], label: tables[ti].label };
  });

  // Scale the chart to every visible line
  let minV = Math.min(...values), maxV = Math.max(...values);
  if(showOpt){
    minV = Math.min(minV, Math.min(...optValues));
    maxV = Math.max(maxV, Math.max(...optValues));
  }
  altLines.forEach(a => {
    minV = Math.min(minV, Math.min(...a.vals));
    maxV = Math.max(maxV, Math.max(...a.vals));
  });
  const range  = maxV - minV || 10;
  const yMin   = minV - range * 0.12;
  const yMax   = maxV + range * 0.12;

  const toX = i  => pad.left + (history.length > 1 ? (i/(history.length-1))*cW : cW/2);
  const toY = v  => pad.top  + cH - ((v - yMin)/(yMax - yMin))*cH;

  // ── Gridlines on clean multiples of 5/10/25/50/… ────────
  const NICE = [5,10,25,50,100,250,500,1000,2500,5000,10000,25000,50000,100000];
  const step = NICE.find(s => (yMax - yMin)/s <= 6) || 250000;
  for(let v = Math.ceil(yMin/step)*step; v <= yMax; v += step){
    const y = toY(v);
    ctx.strokeStyle = v === 0 ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cW, y); ctx.stroke();

    ctx.fillStyle    = '#8899bb';
    ctx.font         = '11px Arial';
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(formatMoney(v*denom), pad.left-6, y);
  }

  // ── X-axis labels (1-based, adjusted for range offset) ─
  const lblCount = Math.min(history.length, 10);
  ctx.fillStyle    = '#8899bb';
  ctx.font         = '11px Arial';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  for(let k=0; k<lblCount; k++){
    const idx = lblCount===1 ? 0 : Math.round(k*(history.length-1)/(lblCount-1));
    ctx.fillText(offset + idx + 1, toX(idx), pad.top+cH+6);
  }

  // ── Axis label ─────────────────────────────────────────
  ctx.fillStyle    = '#c0c8d8';
  ctx.font         = 'bold 10px Arial';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('HAND  NUMBER', pad.left+cW/2, H-1);

  // ── Filled area under the actual line ──────────────────
  if(history.length > 1){
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(values[0]));
    for(let i=1; i<values.length; i++) ctx.lineTo(toX(i), toY(values[i]));
    ctx.lineTo(toX(values.length-1), pad.top+cH);
    ctx.lineTo(toX(0),               pad.top+cH);
    ctx.closePath();
    ctx.fillStyle = 'rgba(240,192,64,0.13)';
    ctx.fill();
  }

  // ── Alternate pay-table lines ──────────────────────────
  if(history.length > 1){
    altLines.forEach(a => {
      ctx.beginPath();
      ctx.moveTo(toX(0), toY(a.vals[0]));
      for(let i=1; i<a.vals.length; i++) ctx.lineTo(toX(i), toY(a.vals[i]));
      ctx.strokeStyle = a.color;
      ctx.lineWidth   = 2;
      ctx.stroke();
    });
  }

  // ── Optimal-play line (cyan) ───────────────────────────
  if(history.length > 1 && showOpt){
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(optValues[0]));
    for(let i=1; i<optValues.length; i++) ctx.lineTo(toX(i), toY(optValues[i]));
    ctx.strokeStyle = '#38b6ff';
    ctx.lineWidth   = 2;
    ctx.stroke();
  }

  // ── Actual line — segment by segment so runs into a green event are green ──
  const isEvent = i => history[i] && (history[i].type==='add' || history[i].type==='reset');
  ctx.lineWidth = 2;
  ctx.lineJoin  = 'round';
  let currentColor = isEvent(0) ? '#3cdc64' : '#f0c040';
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(values[0]));
  for(let i=1; i<values.length; i++){
    const segColor = isEvent(i) ? '#3cdc64' : '#f0c040';
    if(segColor !== currentColor){
      ctx.strokeStyle = currentColor;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX(i-1), toY(values[i-1]));
      currentColor = segColor;
    }
    ctx.lineTo(toX(i), toY(values[i]));
  }
  ctx.strokeStyle = currentColor;
  ctx.stroke();

  // ── Dots: gold = hand, green = add/reset, red = suboptimal hold ─
  const dotR = values.length > 30 ? 2 : 3;
  for(let i=0; i<values.length; i++){
    const h = history[i];
    const ev  = h.type === 'add' || h.type === 'reset';
    const sub = h.type === 'hand' && h.sub === true;
    // Skip plain dots when crowded; always mark events and suboptimal plays
    if(!ev && !sub && values.length > 50) continue;
    if(ev){
      ctx.strokeStyle = 'rgba(60,220,100,0.55)';
      ctx.lineWidth   = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.moveTo(toX(i), pad.top);
      ctx.lineTo(toX(i), pad.top+cH);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.beginPath();
    ctx.arc(toX(i), toY(values[i]), (ev || sub) ? dotR+1 : dotR, 0, Math.PI*2);
    ctx.fillStyle = ev ? '#3cdc64' : sub ? '#ff5050' : '#f0c040';
    ctx.fill();
  }

  // ── Legend (top-right) ─────────────────────────────────
  ctx.font = 'bold 10px Arial';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  let lx = W - pad.right - (60 + (showOpt ? 68 : 0) + (hasSub ? 78 : 0));
  const ly = pad.top - 12;
  ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+16, ly); ctx.stroke();
  ctx.fillStyle = '#c0c8d8'; ctx.fillText('ACTUAL', lx+20, ly);
  if(showOpt){
    lx += 68;
    ctx.strokeStyle = '#38b6ff';
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+16, ly); ctx.stroke();
    ctx.fillText('OPTIMAL', lx+20, ly);
  }
  if(hasSub){
    lx += 74;
    ctx.beginPath(); ctx.arc(lx+4, ly, 3, 0, Math.PI*2);
    ctx.fillStyle = '#ff5050'; ctx.fill();
    ctx.fillStyle = '#c0c8d8'; ctx.fillText('SUBOPT.', lx+11, ly);
  }
  // Alternate pay-table legend, left-aligned on the same line
  let ax = pad.left + 4;
  altLines.forEach(a => {
    ctx.strokeStyle = a.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ax, ly); ctx.lineTo(ax+16, ly); ctx.stroke();
    ctx.fillStyle = '#c0c8d8';
    ctx.fillText(a.label, ax+20, ly);
    ax += 28 + ctx.measureText(a.label).width;
  });

  // ── Hover crosshair + readout ──────────────────────────
  if(hoverIdx !== null && history[hoverIdx]){
    const h = history[hoverIdx];
    const x = toX(hoverIdx);

    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top+cH);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(x, toY(values[hoverIdx]), 5, 0, Math.PI*2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Readout lines
    const num = offset + hoverIdx + 1;
    const fmtD = d => (d >= 0 ? '+' : '') + d;
    const lines = [];
    if(h.type === 'hand'){
      lines.push(`#${num}   ${h.res || 'Hand'}   ${fmtD(h.delta)}`);
      lines.push(`Credits: ${formatMoney(h.credits*denom)}`);
      if(h.sub === true && typeof h.opt === 'number')
        lines.push(`Optimal: ${h.optRes || '?'}   ${fmtD(h.opt)}`);
      else if(h.sub === false)
        lines.push('Optimal hold ✓');
    } else {
      lines.push(`#${num}   ${h.type === 'add' ? 'Added credits' : 'Credits reset'}`);
      lines.push(`Credits: ${formatMoney(h.credits*denom)}`);
    }

    // Colored readout lines; append the alternate-table values at this point
    const tipLines = lines.map((t, i) => ({
      t, c: i === 0 ? '#f0c040' : (t.startsWith('Optimal:') ? '#38b6ff' : '#e0e8f8'),
    }));
    altLines.forEach(a => tipLines.push({
      t: `${a.label}: ${formatMoney(a.vals[hoverIdx]*denom)}`, c: a.color,
    }));

    ctx.font = 'bold 12px Arial';
    const bw = Math.max(...tipLines.map(l => ctx.measureText(l.t).width)) + 20;
    const bh = tipLines.length * 17 + 12;
    let bx = x + 12;
    if(bx + bw > W - pad.right) bx = x - 12 - bw;
    const by = pad.top + 4;

    ctx.fillStyle = 'rgba(4,13,34,0.92)';
    ctx.strokeStyle = '#38609a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx, by, bw, bh, 6) : ctx.rect(bx, by, bw, bh);
    ctx.fill();
    ctx.stroke();

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    tipLines.forEach((l, i) => {
      ctx.fillStyle = l.c;
      ctx.fillText(l.t, bx+10, by+8 + i*17);
    });
  }

  // ── Axes ───────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left,       pad.top+cH);
  ctx.lineTo(pad.left+cW,    pad.top+cH);
  ctx.stroke();
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
function init(){
  loadState();           // restore per-game state + shared settings
  applyAnimSettings();   // push loaded values into the CSS custom property
  applyTheme();
  updateTitleBar();
  buildPayTable();
  buildDenomButtons();
  updateInfoRow();

  // Render empty card backs as placeholders
  renderCardsBack();

  document.getElementById('btn-game').addEventListener('click',        showGameSelect);
  document.getElementById('btn-deal').addEventListener('click',        deal);
  document.getElementById('btn-bet-one').addEventListener('click',     betOne);
  document.getElementById('btn-bet-max').addEventListener('click',     betMax);
  document.getElementById('btn-add-credits').addEventListener('click', addCredits);
  document.getElementById('btn-reset').addEventListener('click',       resetCredits);
  document.getElementById('btn-settings').addEventListener('click',    showSettings);
  document.getElementById('btn-graph').addEventListener('click',       showGraph);
  document.getElementById('btn-analyze').addEventListener('click',     showAnalysis);
  document.getElementById('cs-coin').addEventListener('click',         showDenomPopup);

  // Delegated card tap on pointerdown — registers the instant the finger
  // touches, so rapid multi-card taps all land (click waits for finger-up
  // and iOS can swallow quick successive ones)
  document.getElementById('cards-row').addEventListener('pointerdown', e => {
    if (e.button !== undefined && e.button !== 0) return;   // primary button/touch only
    const cardEl = e.target.closest('.card');
    if (!cardEl) return;
    e.preventDefault();   // suppress the follow-up synthetic mouse events
    const i = parseInt(cardEl.dataset.index);
    if (!isNaN(i)) toggleHold(i);
  });

  rescale();

  // Keyboard shortcuts
  document.addEventListener('keydown', e=>{
    if(e.code==='Space' || e.code==='Enter') { e.preventDefault(); deal(); }
    if(e.code==='KeyB') betOne();
    if(e.code==='KeyM') betMax();
    if(phase==='holding'){
      const keys={'Digit1':0,'Digit2':1,'Digit3':2,'Digit4':3,'Digit5':4};
      if(keys[e.code]!==undefined) toggleHold(keys[e.code]);
    }
  });
}

init();

// ════════════════════════════════════════════════════════════
//  RESPONSIVE SCALING
//  Scales the fixed-width terminal to fill any screen size,
//  from iPhone SE landscape up to iPad Pro.
// ════════════════════════════════════════════════════════════
function rescale() {
  const t = document.getElementById('terminal');

  // Reset to natural layout so offsetWidth/Height are unscaled
  t.style.transform = 'none';
  t.style.left      = '0';
  t.style.top       = '0';

  // Safe-area insets via CSS custom properties (env() values resolve correctly here)
  const cs    = getComputedStyle(document.documentElement);
  const safeW = parseFloat(cs.getPropertyValue('--sal')) + parseFloat(cs.getPropertyValue('--sar')) || 0;
  const safeH = parseFloat(cs.getPropertyValue('--sat')) + parseFloat(cs.getPropertyValue('--sab')) || 0;

  const vp = window.visualViewport || { width: window.innerWidth, height: window.innerHeight };

  const scale = Math.min(
    (vp.width  - safeW - 8) / t.offsetWidth,
    (vp.height - safeH - 8) / t.offsetHeight,
    1.4          // max upscale for iPad
  );

  // Centre the terminal precisely using fixed positioning + manual offsets.
  // transform:scale() scales the terminal as a single bitmap — fonts, card
  // symbols, borders and layout all scale together by exactly the same factor,
  // unlike CSS zoom which can diverge from font rendering in Safari/iOS.
  const scaledW = t.offsetWidth  * scale;
  const scaledH = t.offsetHeight * scale;
  t.style.position        = 'fixed';
  t.style.left            = Math.round((vp.width  - scaledW) / 2) + 'px';
  t.style.top             = Math.round((vp.height - scaledH) / 2) + 'px';
  t.style.transformOrigin = 'top left';
  t.style.transform       = `scale(${scale})`;
  t.style.visibility      = 'visible';
}

// visualViewport fires its own resize; fall back to window for desktop
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', rescale);
} else {
  window.addEventListener('resize', rescale);
}
window.addEventListener('orientationchange', () => setTimeout(rescale, 200));

// ════════════════════════════════════════════════════════════
//  SERVICE WORKER REGISTRATION
// ════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        // iOS home-screen apps resume from memory instead of relaunching,
        // which skips the normal update check — so re-check for a new
        // sw.js every time the app returns to the foreground.
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update().catch(()=>{});
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
